<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Spacing, radii & shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 32px; background: var(--st-paper); }
h2 { font-family: var(--st-font-display); font-weight: 800; font-size: 18px; margin: 0 0 14px; letter-spacing: -0.02em; }
.section { padding: 18px 0; border-bottom: 1.5px dashed var(--st-grey-200); }
.section:last-child { border-bottom: 0; }
.spacing { display: flex; align-items: flex-end; gap: 16px; }
.spacing .item { display: flex; flex-direction: column; align-items: center; gap: 6px; font-family: var(--st-font-mono); font-size: 10px; color: var(--st-fg-2); }
.spacing .bar { background: var(--st-ink); width: 8px; }
.radii { display: flex; gap: 14px; flex-wrap: wrap; }
.radii .item { width: 110px; height: 90px; background: var(--st-yellow); border: 2px solid var(--st-ink); display: grid; place-items: center; font-family: var(--st-font-mono); font-size: 11px; }
.shadows { display: flex; gap: 24px; flex-wrap: wrap; }
.shadows .item { width: 160px; height: 100px; background: var(--st-paper); border: 2px solid var(--st-ink); border-radius: 16px; display: grid; place-items: center; font-family: var(--st-font-mono); font-size: 11px; color: var(--st-fg-2); }
.shadow-press { box-shadow: 4px 4px 0 0 var(--st-ink); }
.shadow-card { box-shadow: 0 1px 0 0 var(--st-ink); }
</style></head>
<body>

<div class="section">
  <h2>Spacing scale</h2>
  <div class="spacing">
    <div class="item"><div class="bar" style="height:4px"></div>4</div>
    <div class="item"><div class="bar" style="height:8px"></div>8</div>
    <div class="item"><div class="bar" style="height:12px"></div>12</div>
    <div class="item"><div class="bar" style="height:16px"></div>16</div>
    <div class="item"><div class="bar" style="height:24px"></div>24</div>
    <div class="item"><div class="bar" style="height:32px"></div>32</div>
    <div class="item"><div class="bar" style="height:48px"></div>48</div>
    <div class="item"><div class="bar" style="height:64px"></div>64</div>
    <div class="item"><div class="bar" style="height:96px"></div>96</div>
    <div class="item"><div class="bar" style="height:128px"></div>128</div>
  </div>
</div>

<div class="section">
  <h2>Radii</h2>
  <div class="radii">
    <div class="item" style="border-radius:4px">xs / 4</div>
    <div class="item" style="border-radius:8px">sm / 8</div>
    <div class="item" style="border-radius:16px">md / 16</div>
    <div class="item" style="border-radius:24px">lg / 24</div>
    <div class="item" style="border-radius:999px">pill / 999</div>
  </div>
</div>

<div class="section">
  <h2>Shadows</h2>
  <div class="shadows">
    <div class="item shadow-card">card / 0 1px 0 ink</div>
    <div class="item shadow-press">press / 4px 4px 0 ink</div>
  </div>
</div>

</body></html>
