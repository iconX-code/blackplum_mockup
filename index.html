    /* ================================================================
     * Phase 5 — ButtonEditSheet
     * ================================================================ */
    function ButtonEditSheet({ isOpen, onClose, onSave, initial }) {
      const [btnText, setBtnText] = useState('');
      const [btnUrl, setBtnUrl] = useState('');
      const showToast = useToast();

      useEffect(() => {
        if (isOpen) {
          setBtnText(initial ? initial.text : '');
          setBtnUrl(initial ? initial.url : '');
        }
      }, [isOpen, initial]);

      const handleSave = () => {
        if (!btnText.trim() || !btnUrl.trim()) return;
        onSave({ text: btnText.trim(), url: btnUrl.trim() });
      };

      const handleImportClick = () => {
        showToast({ message: '준비 중인 기능이에요' });
      };

      if (!isOpen) return null;

      return (
        <div className="button-edit-sheet-overlay">
          <div className="button-edit-sheet-overlay__backdrop" onClick={onClose} aria-hidden="true" />
          <div className="button-edit-sheet" role="dialog" aria-label="버튼 편집">
            <div className="button-edit-sheet__handle" />
            <p className="button-edit-sheet__title">버튼 설정</p>

            <button type="button" className="button-edit-sheet__import-btn" onClick={handleImportClick} disabled>
              <Icon name="link" size="sm" tone="inherit" />
              링크 블록에서 가져오기
            </button>

            <div className="button-edit-sheet__field">
              <label className="button-edit-sheet__label">버튼 텍스트</label>
              <input
                type="text"
                className="button-edit-sheet__input"
                placeholder="예: 자세히 보기"
                value={btnText}
                onChange={(e) => setBtnText(e.target.value)}
              />
            </div>

            <div className="button-edit-sheet__field">
              <label className="button-edit-sheet__label">URL</label>
              <input
                type="url"
                className="button-edit-sheet__input"
                placeholder="https://"
                value={btnUrl}
                onChange={(e) => setBtnUrl(e.target.value)}
              />
            </div>

            <button
              type="button"
              className="button-edit-sheet__save"
              onClick={handleSave}
              disabled={!btnText.trim() || !btnUrl.trim()}
            >
              저장
            </button>
          </div>
        </div>
      );
    }

    /* ================================================================
     * Phase 5 — MessageInputPanel (공통 — DIFFERENT_MESSAGES 양쪽에 재활용)
     * ================================================================ */
    function MessageInputPanel({ message, onChangeMessage, errors }) {
      const [sheetOpen, setSheetOpen] = useState(false);
      const [editingBtnIdx, setEditingBtnIdx] = useState(null);

      const MOCK_IMAGES = [
        'https://picsum.photos/seed/auto1/300/300',
        'https://picsum.photos/seed/auto2/300/300',
        'https://picsum.photos/seed/auto3/300/300',
        'https://picsum.photos/seed/auto4/300/300',
        'https://picsum.photos/seed/auto5/300/300',
      ];

      const handleBodyChange = (e) => onChangeMessage({ ...message, body: e.target.value });
      const handleTypeChange = (type) => onChangeMessage({ ...message, type });

      const addImage = () => {
        if (message.images.length >= 10) return;
        const mockUrl = MOCK_IMAGES[message.images.length % MOCK_IMAGES.length];
        onChangeMessage({
          ...message,
          images: [...message.images, { url: mockUrl, order: message.images.length }],
        });
      };

      const removeImage = (idx) => {
        onChangeMessage({
          ...message,
          images: message.images.filter((_, i) => i !== idx).map((img, i) => ({ ...img, order: i })),
        });
      };

      const openAddBtn = () => { setEditingBtnIdx(null); setSheetOpen(true); };
      const openEditBtn = (idx) => { setEditingBtnIdx(idx); setSheetOpen(true); };
      const removeBtn = (idx) => {
        onChangeMessage({ ...message, buttons: message.buttons.filter((_, i) => i !== idx) });
      };

      const handleSheetSave = ({ text, url }) => {
        const newBtn = {
          id: `btn_runtime_${Date.now()}`,
          text,
          action_type: 'URL',
          url,
        };
        if (editingBtnIdx !== null) {
          const next = [...message.buttons];
          next[editingBtnIdx] = { ...next[editingBtnIdx], text, url };
          onChangeMessage({ ...message, buttons: next });
        } else {
          onChangeMessage({ ...message, buttons: [...message.buttons, newBtn] });
        }
        setSheetOpen(false);
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--gap-inline-sm)' }}>
          {/* 탭 전환 */}
          <div className="message-tab-switcher">
            <button
              type="button"
              className={`message-tab-switcher__tab${message.type === 'TEXT' ? ' message-tab-switcher__tab--active' : ''}`}
              onClick={() => handleTypeChange('TEXT')}
            >
              <Icon name="text" size="sm" tone="inherit" />
              텍스트
            </button>
            <button
              type="button"
              className={`message-tab-switcher__tab${message.type === 'IMAGE_CAROUSEL' ? ' message-tab-switcher__tab--active' : ''}`}
              onClick={() => handleTypeChange('IMAGE_CAROUSEL')}
            >
              <Icon name="carousel" size="sm" tone="inherit" />
              이미지 캐러셀
            </button>
          </div>

          {/* 본문 미리보기 */}
          <div className="message-bubble-preview">
            <span className="message-bubble-preview__label">미리보기</span>
            {message.type === 'IMAGE_CAROUSEL' && message.images.length > 0 && (
              <div className="message-bubble-preview__image-row">
                {message.images.map((img, i) => (
                  <img key={i} className="message-bubble-preview__image-thumb" src={img.url} alt={`이미지 ${i + 1}`} />
                ))}
              </div>
            )}
            {message.body ? (
              <span className="message-bubble-preview__bubble">{message.body}</span>
            ) : (
              <span className="message-bubble-preview__empty">메시지를 입력해주세요</span>
            )}
          </div>

          {/* 본문 입력 */}
          <textarea
            className="message-body-input"
            placeholder="고객에게 보낼 메시지를 입력해주세요"
            value={message.body}
            onChange={handleBodyChange}
            rows={4}
          />
          {errors && errors.body && <p className="wizard-field-error">{errors.body}</p>}

          {/* 이미지 업로더 */}
          {message.type === 'IMAGE_CAROUSEL' && (
            <div className="message-image-uploader">
              <p className="wizard-section-label">이미지 ({message.images.length}/10)</p>
              <div className="message-image-uploader__images">
                {message.images.map((img, i) => (
                  <div key={i} className="message-image-uploader__thumb">
                    <img src={img.url} alt={`업로드 이미지 ${i + 1}`} />
                    <button type="button" className="message-image-uploader__thumb-remove" onClick={() => removeImage(i)} aria-label="이미지 삭제">
                      <Icon name="x" size="xs" tone="inverse" />
                    </button>
                  </div>
                ))}
                <button
                  type="button"
                  className="message-image-uploader__add-btn"
                  onClick={addImage}
                  disabled={message.images.length >= 10}
                  aria-label="이미지 추가"
                >
                  <Icon name="upload" size="sm" tone="muted" />
                  추가
                </button>
              </div>
              {errors && errors.images && <p className="wizard-field-error">{errors.images}</p>}
            </div>
          )}

          {/* 버튼 목록 */}
          <div>
            <p className="wizard-section-label">버튼 (선택)</p>
            <div className="message-button-list">
              {message.buttons.map((btn, i) => (
                <div key={btn.id} className="button-row">
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="button-row__text">{btn.text}</div>
                    <div className="button-row__url">{btn.url}</div>
                  </div>
                  <div className="button-row__actions">
                    <button type="button" className="button-row__action" onClick={() => openEditBtn(i)} aria-label="버튼 편집">
                      <Icon name="edit" size="xs" tone="muted" />
                    </button>
                    <button type="button" className="button-row__action" onClick={() => removeBtn(i)} aria-label="버튼 삭제">
                      <Icon name="trash" size="xs" tone="muted" />
                    </button>
                  </div>
                </div>
              ))}
              <button type="button" className="button-add-trigger" onClick={openAddBtn}>
                <Icon name="plus" size="sm" tone="inherit" />
                버튼 추가하기
              </button>
            </div>
          </div>

          <ButtonEditSheet
            isOpen={sheetOpen}
            onClose={() => setSheetOpen(false)}
            onSave={handleSheetSave}
            initial={editingBtnIdx !== null ? message.buttons[editingBtnIdx] : null}
          />
        </div>
      );
    }

    /* ================================================================
     * Phase 5 — WizardStepMessage (step 4)
     * ================================================================ */
    function WizardStepMessage({ draft, onChange, errors }) {
      const [variantTab, setVariantTab] = useState('follower'); // 'follower' | 'non_follower'
      const isDiff = draft.follower_branch.mode === 'DIFFERENT_MESSAGES';

      const handleSingleChange = (msg) => {
        onChange('message', msg);
      };

      const handleVariantChange = (variant, msg) => {
        if (variant === 'follower') onChange('follower_branch.follower_message', msg);
        else onChange('follower_branch.non_follower_message', msg);
      };

      if (isDiff) {
        const followerMsg = draft.follower_branch.follower_message || { type: 'TEXT', body: '', images: [], buttons: [] };
        const nonFollowerMsg = draft.follower_branch.non_follower_message || { type: 'TEXT', body: '', images: [], buttons: [] };
        const currentMsg = variantTab === 'follower' ? followerMsg : nonFollowerMsg;

        return (
          <div className="wizard-step-message">
            <p className="wizard-section-label">자동화할 메시지를 설정해주세요</p>
            <div className="follower-variant-tabs">
              <div className="follower-variant-tabs__header">
                <button
                  type="button"
                  className={`follower-variant-tabs__tab${variantTab === 'follower' ? ' follower-variant-tabs__tab--active' : ''}`}
                  onClick={() => setVariantTab('follower')}
                >
                  팔로워
                </button>
                <button
                  type="button"
                  className={`follower-variant-tabs__tab${variantTab === 'non_follower' ? ' follower-variant-tabs__tab--active' : ''}`}
                  onClick={() => setVariantTab('non_follower')}
                >
                  비팔로워
                </button>
              </div>
              <div className="follower-variant-tabs__body">
                <MessageInputPanel
                  message={currentMsg}
                  onChangeMessage={(msg) => handleVariantChange(variantTab, msg)}
                  errors={errors}
                />
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="wizard-step-message">
          <p className="wizard-section-label">자동화할 메시지를 설정해주세요</p>
          <MessageInputPanel
            message={draft.message}
            onChangeMessage={handleSingleChange}
            errors={errors}
          />
        </div>
      );
    }

    /* ================================================================
     * Phase 5 — WizardStepReview (step 5)
     * ================================================================ */
    function WizardStepReview({ draft, onGotoStep, onChange }) {
      const igOrigins = window.MOCK_DATA.origins.filter((o) => o.platform === 'instagram' && o.type === 'post');

      const postNames = draft.target_mode === 'FUTURE_POSTS'
        ? '향후 게시물'
        : draft.target_post_ids.map((id) => {
          const o = igOrigins.find((o) => o.media_id === id);
          return o ? o.display_name : id;
        }).join(', ') || '미선택';

      const triggerSummary = draft.trigger_mode === 'ALL_COMMENTS'
        ? '모든 댓글'
        : draft.trigger_keywords.length > 0
          ? draft.trigger_keywords.join(', ')
          : '키워드 미입력';

      const replySummary = !draft.reply.enabled
        ? '답글 없음'
        : `${draft.reply.tone === 'POLITE' ? '공손하게' : draft.reply.tone === 'FRIENDLY' ? '친근하게' : '직접 입력'} · ${draft.reply.items.length}개`;

      const branchSummary = {
        SAME: '모두에게 같은 메시지',
        FOLLOWERS_ONLY: '팔로워에게만',
        NON_FOLLOWERS_ONLY: '비팔로워에게만',
        DIFFERENT_MESSAGES: '팔로워/비팔로워 다른 메시지',
      }[draft.follower_branch.mode];

      const mainMessage = draft.follower_branch.mode === 'DIFFERENT_MESSAGES'
        ? draft.follower_branch.follower_message || draft.message
        : draft.message;

      return (
        <div className="wizard-step-review">
          {/* 타이틀 입력 */}
          <div>
            <p className="wizard-section-label">자동화 이름 (선택)</p>
            <input
              type="text"
              className="wizard-title-input"
              placeholder="예: 마스크팩 공구 이벤트"
              value={draft.title || ''}
              onChange={(e) => onChange('title', e.target.value || null)}
            />
          </div>

          {/* 요약 목록 */}
          <div>
            <p className="wizard-section-label">설정 요약</p>
            <div className="review-summary-list">
              <div className="review-summary-row">
                <span className="review-summary-row__step-label">STEP 1</span>
                <div className="review-summary-row__content">
                  <span className="review-summary-row__value" style={{ whiteSpace: 'normal' }}>
                    <strong>게시물:</strong> {postNames}<br />
                    <strong>댓글:</strong> {triggerSummary}
                  </span>
                </div>
                <button type="button" className="review-summary-row__edit" onClick={() => onGotoStep(1)}>편집</button>
              </div>
              <div className="review-summary-row">
                <span className="review-summary-row__step-label">STEP 2</span>
                <div className="review-summary-row__content">
                  <span className="review-summary-row__value">{replySummary}</span>
                </div>
                <button type="button" className="review-summary-row__edit" onClick={() => onGotoStep(2)}>편집</button>
              </div>
              <div className="review-summary-row">
                <span className="review-summary-row__step-label">STEP 3</span>
                <div className="review-summary-row__content">
                  <span className="review-summary-row__value">{branchSummary}</span>
                </div>
                <button type="button" className="review-summary-row__edit" onClick={() => onGotoStep(3)}>편집</button>
              </div>
              <div className="review-summary-row">
                <span className="review-summary-row__step-label">STEP 4</span>
                <div className="review-summary-row__content">
                  <span className="review-summary-row__value" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {draft.follower_branch.mode === 'DIFFERENT_MESSAGES' ? '팔로워/비팔로워 각각 설정됨' : (mainMessage.body || '메시지 미입력')}
                  </span>
                </div>
                <button type="button" className="review-summary-row__edit" onClick={() => onGotoStep(4)}>편집</button>
              </div>
            </div>
          </div>

          {/* 메시지 미리보기 */}
          <div>
            <p className="wizard-section-label">최종 메시지 미리보기</p>
            <div className="message-bubble-preview">
              {mainMessage.type === 'IMAGE_CAROUSEL' && mainMessage.images.length > 0 && (
                <div className="message-bubble-preview__image-row">
                  {mainMessage.images.map((img, i) => (
                    <img key={i} className="message-bubble-preview__image-thumb" src={img.url} alt={`이미지 ${i + 1}`} />
                  ))}
                </div>
              )}
              {mainMessage.body ? (
                <span className="message-bubble-preview__bubble">{mainMessage.body}</span>
              ) : (
                <span className="message-bubble-preview__empty">메시지 본문이 없어요</span>
              )}
            </div>
          </div>

          {/* 본문 인라인 수정 */}
          {draft.follower_branch.mode !== 'DIFFERENT_MESSAGES' && (
            <div className="review-body-inline-editor">
              <p className="review-body-inline-editor__label">본문 수정</p>
              <textarea
                className="review-body-inline-editor__textarea"
                value={mainMessage.body}
                onChange={(e) => onChange('message.body', e.target.value)}
                placeholder="본문을 여기서 바로 수정할 수 있어요"
                rows={3}
              />
            </div>
          )}
        </div>
      );
    }

    /* ================================================================
     * Phase 5 — MacroBuilderWizard
     * spec.md §5-9
     * ================================================================ */
    function MacroBuilderWizard({ wizardState, dispatch, onSave, onClose, igOrigins, onCloseAttemptRef }) {
      const initialSnapshotRef = useRef(null);
      const [confirmClose, setConfirmClose] = useState(false);
      const showToast = useToast();
      const { draft, currentStep, visitedSteps, errors, mode } = wizardState;

      // 진입 시 snapshot 저장
      useEffect(() => {
        if (draft && !initialSnapshotRef.current) {
          initialSnapshotRef.current = JSON.stringify(draft);
        }
      }, [draft]);

      // mode null → 컴포넌트 자체가 숨겨지면 ref 초기화
      useEffect(() => {
        if (!mode) initialSnapshotRef.current = null;
      }, [mode]);

      const handleFieldChange = useCallback((path, value) => {
        dispatch({ type: 'UPDATE_FIELD', path, value });
      }, [dispatch]);

      // step 1 검증
      const validateStep1 = () => {
        const errs = {};
        if (draft.target_mode === 'SPECIFIC_POSTS' && draft.target_post_ids.length < 1) {
          errs.target_post_ids = '게시물을 1개 이상 선택해주세요';
        }
        if (draft.trigger_mode === 'KEYWORD_MATCH' && draft.trigger_keywords.length < 1) {
          errs.trigger_keywords = '키워드를 1개 이상 입력해주세요';
        }
        return errs;
      };

      // step 2 검증
      const validateStep2 = () => {
        const errs = {};
        if (draft.reply.enabled) {
          if (draft.reply.items.length < 1) errs['reply.items'] = '답글을 1개 이상 입력해주세요';
          else if (draft.reply.items.some((s) => !s.trim())) errs['reply.items'] = '빈 답글이 있어요. 내용을 채워주세요';
        }
        return errs;
      };

      // step 4 검증
      const validateStep4 = () => {
        const errs = {};
        if (draft.follower_branch.mode === 'DIFFERENT_MESSAGES') {
          if (!isMessageValid(draft.follower_branch.follower_message)) errs.body = '팔로워 메시지 본문을 입력해주세요';
          if (!isMessageValid(draft.follower_branch.non_follower_message)) errs.body = '비팔로워 메시지 본문을 입력해주세요';
        } else {
          if (!isMessageValid(draft.message)) {
            const m = draft.message;
            if (!m.body || !m.body.trim()) errs.body = '메시지 본문을 입력해주세요';
            else if (m.type === 'IMAGE_CAROUSEL' && m.images.length < 1) errs.images = '이미지를 1장 이상 추가해주세요';
            else errs.body = '버튼 텍스트와 URL을 모두 입력해주세요';
          }
        }
        return errs;
      };

      const handleNext = () => {
        let errs = {};
        if (currentStep === 1) errs = validateStep1();
        else if (currentStep === 2) errs = validateStep2();
        else if (currentStep === 4) errs = validateStep4();

        if (Object.keys(errs).length > 0) {
          dispatch({ type: 'SET_ERRORS', errors: errs });
          return;
        }
        dispatch({ type: 'NEXT_STEP' });
      };

      const handlePrev = () => dispatch({ type: 'PREV_STEP' });

      const handleGotoStep = (step) => {
        dispatch({ type: 'GOTO_STEP', step });
      };

      const handleSave = () => {
        if (!isAutomationValid(draft)) {
          showToast({ message: '필수 항목을 모두 채워주세요' });
          return;
        }
        onSave(draft);
        dispatch({ type: 'SAVE' });
        showToast({ message: '자동화가 등록되었어요' });
      };

      const handleCloseAttempt = () => {
        const currentSnap = JSON.stringify(draft);
        const dirty = initialSnapshotRef.current && currentSnap !== initialSnapshotRef.current;
        if (dirty) {
          setConfirmClose(true);
        } else {
          onClose();
          dispatch({ type: 'CLOSE' });
        }
      };

      // 모바일 뒤로가기 버튼 등 외부 진입점에 동일 dirty-check 흐름 노출
      useEffect(() => {
        if (onCloseAttemptRef) onCloseAttemptRef.current = handleCloseAttempt;
        return () => { if (onCloseAttemptRef) onCloseAttemptRef.current = null; };
      });

      const handleConfirmClose = () => {
        setConfirmClose(false);
        onClose();
        dispatch({ type: 'CLOSE' });
      };

      if (!draft || !mode) return null;

      const STEP_NAV_LABELS = ['Step 1', 'Step 2', 'Step 3', 'Step 4', 'Step 5'];

      const stepTitles = [
        '어떤 댓글에 메시지를 보낼까요?',
        '댓글에 답글도 남겨볼까요?',
        '팔로우 여부에 따라 다르게 보낼까요?',
        '자동화할 메시지를 설정해주세요.',
        '규칙을 최종 점검해봐요.',
      ];

      // step별 onChange (직접 path 처리 단순화)
      const step1Change = (key, value) => handleFieldChange(key, value);
      // reply 관련: onChange('reply.enabled', val), onChange('reply.tone', val), onChange('reply.items', val)
      const step2Change = (path, value) => handleFieldChange(path, value);
      const step3Change = (path, value) => handleFieldChange(path, value);
      const step4Change = (path, value) => {
        if (path === 'message') handleFieldChange('message', value);
        else if (path === 'follower_branch.follower_message') handleFieldChange('follower_branch.follower_message', value);
        else if (path === 'follower_branch.non_follower_message') handleFieldChange('follower_branch.non_follower_message', value);
        else handleFieldChange(path, value);
      };

      return (
        <div className="macro-builder-wizard">
          {/* 헤더 */}
          <div className="wizard-header">
            <span className="wizard-header__title">{stepTitles[currentStep - 1]}</span>
            <button type="button" className="wizard-header__close" onClick={handleCloseAttempt} aria-label="닫기">
              <Icon name="x" size="md" tone="muted" />
            </button>
          </div>

          {/* Step nav — segmented tabs + 양 끝 chevron */}
          <div className="wizard-step-nav" role="tablist" aria-label="단계 탐색">
            <button
              type="button"
              className="wizard-step-nav__chevron"
              onClick={handlePrev}
              disabled={currentStep === 1}
              aria-label="이전 단계"
            >
              <Icon name="chevron-left" size="sm" />
            </button>
            <div className="wizard-step-nav__tabs">
              {[1, 2, 3, 4, 5].map((s) => {
                const isActive = s === currentStep;
                const isReachable = visitedSteps.has(s);
                return (
                  <button
                    key={s}
                    type="button"
                    role="tab"
                    aria-selected={isActive}
                    disabled={!isReachable && !isActive}
                    className={
                      'wizard-step-nav__tab' +
                      (isActive ? ' wizard-step-nav__tab--active' : '') +
                      (!isReachable && !isActive ? ' wizard-step-nav__tab--disabled' : '')
                    }
                    onClick={() => isReachable && handleGotoStep(s)}
                  >
                    {STEP_NAV_LABELS[s - 1]}
                  </button>
                );
              })}
            </div>
            {currentStep < 5 ? (
              <button
                type="button"
                className="wizard-step-nav__chevron"
                onClick={handleNext}
                aria-label="다음 단계"
              >
                <Icon name="chevron-right" size="sm" />
              </button>
            ) : (
              <button
                type="button"
                className="wizard-button--primary"
                onClick={handleSave}
                disabled={!isAutomationValid(draft)}
              >
                완료
              </button>
            )}
          </div>

          {/* Step body */}
          <div className="wizard-step-body">
            {currentStep === 1 && (
              <WizardStepTrigger draft={draft} onChange={step1Change} errors={errors} igOrigins={igOrigins} />
            )}
            {currentStep === 2 && (
              <WizardStepReply draft={draft} onChange={step2Change} errors={errors} />
            )}
            {currentStep === 3 && (
              <WizardStepFollowerBranch draft={draft} onChange={step3Change} errors={errors} />
            )}
            {currentStep === 4 && (
              <WizardStepMessage draft={draft} onChange={step4Change} errors={errors} />
            )}
            {currentStep === 5 && (
              <WizardStepReview draft={draft} onGotoStep={handleGotoStep} onChange={(key, val) => handleFieldChange(key, val)} />
            )}
          </div>

          {/* dirty 닫기 confirm */}
          <Modal
            isOpen={confirmClose}
            onClose={() => setConfirmClose(false)}
            title="변경사항 버리기"

    // IG 계정 필터 기반 룰 매칭 helper (spec §5-9-10)
    function ruleMatchesIgAccountFilter(automation, activeIgAccountIds, origins) {
      if (activeIgAccountIds.size === 0) return false;
      if (automation.target_mode === 'FUTURE_POSTS') return true;
      return automation.target_post_ids.some((media_id) => {
        const origin = origins.find((o) => o.media_id === media_id);
        return origin && activeIgAccountIds.has(origin.user_sns_account_id);
      });
    }

    function AutomationListView({ automations, activeIgAccountIds, onOpenWizardNew, onOpenWizardTemplate, onOpenWizardEdit, onToggleStatus }) {

      const origins = window.MOCK_DATA.origins;

      // IG 계정 필터 적용한 룰 리스트 (mock array 순서 그대로)
      const filteredAutomations = useMemo(() => {
        if (!activeIgAccountIds) return automations;
        return automations.filter((a) => ruleMatchesIgAccountFilter(a, activeIgAccountIds, origins));
      }, [automations, activeIgAccountIds, origins]);

      // IgPostGridPicker에 전달할 visiblePosts — activeIgAccountIds 실시간 반영
      const visiblePosts = useMemo(() => {
        if (!activeIgAccountIds || activeIgAccountIds.size === 0) return [];
        return origins.filter(
          (o) => o.platform === 'instagram' && o.type === 'post' && activeIgAccountIds.has(o.user_sns_account_id)
        );
      }, [activeIgAccountIds, origins]);

      return (
        <div className="automation-list">

              <span className="automation-list-header__banner-text">

              </span>
            </div>
          </div>

          {/* 템플릿 캐러셀 */}
          <div className="automation-template-carousel">
            {/* Blank 카드 */}
            <button type="button" className="automation-template-card automation-template-card--blank" onClick={onOpenWizardNew}>
              <Icon name="plus" size="lg" tone="muted" />

              description="상단 SNS 필터에서 인스타그램 계정을 켜주세요."
            />
          ) : filteredAutomations.length === 0 ? (
            <EmptyState

    // primaryCategory — thread 태그로 카테고리 도출
    function primaryCategory(thread) {
      const { TAG_CATALOG } = window.MOCK_DATA;
      if (thread.tags.some((t) => TAG_CATALOG.business.includes(t))) return 'business';
      if (thread.tags.some((t) => TAG_CATALOG.ops.includes(t)))      return 'ops';
      if (thread.tags.some((t) => TAG_CATALOG.social.includes(t)))   return 'social';
      return 'direct_check';
    }

    // getThreadMessages — base + outgoing override 합산
    function getThreadMessages(thread, outgoingOverrides) {
      const base = thread.message_ids.map((id) => window.MOCK_DATA.messages.find((m) => m.id === id)).filter(Boolean);
      const extra = outgoingOverrides.get(thread.id) || [];
      return [...base, ...extra].sort((a, b) => a.sent_at.localeCompare(b.sent_at));
    }

    // ReplyEditor — 답장 입력 + 발송
    function ReplyEditor({ thread, replyText, setReplyText, onSend, textareaRef }) {
      const placeholder =
        thread.message_type === 'comment' ? '댓글로 답장하기' :
        thread.message_type === 'email'   ? '회신 작성' :
        '메시지 입력';

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          if (replyText.trim()) onSend();
        }
      };

      return (
        <div className="reply-editor">
          <textarea
            ref={textareaRef}
            className="reply-editor__textarea"
            placeholder={placeholder}
            value={replyText}
            onChange={(e) => setReplyText(e.target.value)}
            onKeyDown={handleKeyDown}
            rows={3}
          />
          <button
            type="button"
            className="reply-editor__send"
            disabled={!replyText.trim()}
            onClick={onSend}
            aria-label="발송"
          >
            <Icon name="send" size="md" tone="inherit" />
          </button>
        </div>
      );

    // ReplyArea — SavedReplyChips + AIDraftButton + ReplyEditor 묶음
    function ReplyArea({ thread, onSendReply, textareaRef }) {
      const [replyText, setReplyText] = useState('');

      const handleSelect = useCallback((text) => {
        setReplyText(text);
        if (textareaRef && textareaRef.current) textareaRef.current.focus();
      }, [textareaRef]);

      const handleSend = useCallback(() => {
        if (!replyText.trim()) return;
        onSendReply(thread.id, replyText.trim());
        setReplyText('');
      }, [replyText, thread.id, onSendReply]);

      return (
        <div className="reply-area">
          <div className="reply-area__chips-row">
            <SavedReplyChips thread={thread} onSelect={handleSelect} />
            <AIDraftButton thread={thread} onSelect={handleSelect} />

          <ReplyEditor
            thread={thread}
            replyText={replyText}
            setReplyText={setReplyText}
            onSend={handleSend}
            textareaRef={textareaRef}
          />
        </div>
      );
    }

      // Phase 5: Wizard 상태
      const [wizardState, wizardDispatch] = useReducer(wizardReducer, WIZARD_INITIAL_STATE);

      // Phase 5: Automation mock data mutation state
      const [automationStatusOverrides, setAutomationStatusOverrides] = useState(() => new Map());
      const [automationOverrides, setAutomationOverrides] = useState(() => new Map());
      const [addedAutomations, setAddedAutomations] = useState([]);
      const [pendingCategoryChange, setPendingCategoryChange] = useState(null);

      // Phase 5 Round 1: SNS 필터 snapshot ref (dm_automation 진입/이탈 복원용)
      const snsFilterSnapshotRef = useRef(null);

      // Phase 5 Round 4: wizard의 handleCloseAttempt를 외부에서 호출할 수 있도록 ref 보관
      const wizardCloseAttemptRef = useRef(null);

      // 뷰포트 폭 감지 — mobile(≤767px)에서만 overlay 모드
      const [isNarrow, setIsNarrow] = useState(() => window.innerWidth < 768);
      useEffect(() => {
        const onResize = () => setIsNarrow(window.innerWidth < 768);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      const showToast = useToast();

      const handleToggleAccount = useCallback((id) => {
        setSelectedAccountIds((prev) => {
          const next = new Set(prev);
          if (next.has(id)) {
            next.delete(id);
          } else {
            next.add(id);
          }
          return next;
        });
      }, []);

      const handleToggleAll = useCallback(() => {
        setSelectedAccountIds((prev) =>
          prev.size === accounts.length ? new Set() : new Set(accounts.map((a) => a.id))
        );
      }, [accounts]);

      const handleOpenLsb = useCallback(() => setLsbOpen(true), []);
      const handleCloseLsb = useCallback(() => setLsbOpen(false), []);

      // getDisplayedAutomations — base + override 합성
      const getDisplayedAutomations = useCallback(() => {
        const base = window.MOCK_DATA.automations;
        const merged = base.map((a) => {
          const statusOverride = automationStatusOverrides.get(a.id);
          const fullOverride = automationOverrides.get(a.id);
          if (fullOverride) return { ...fullOverride, status: statusOverride || fullOverride.status };
          if (statusOverride) return { ...a, status: statusOverride };
          return a;
        });
        const extras = addedAutomations.map((a) => {
          const statusOverride = automationStatusOverrides.get(a.id);
          const fullOverride = automationOverrides.get(a.id);
          if (fullOverride) return { ...fullOverride, status: statusOverride || fullOverride.status };
          if (statusOverride) return { ...a, status: statusOverride };
          return a;
        });
        return [...merged, ...extras];
      }, [automationStatusOverrides, automationOverrides, addedAutomations]);

      // Wizard handlers
      const handleWizardOpenNew = useCallback(() => {
        setSelectedThreadId(null);
        wizardDispatch({ type: 'OPEN_NEW' });
      }, []);

      const handleWizardOpenTemplate = useCallback((key) => {
        setSelectedThreadId(null);
        wizardDispatch({ type: 'OPEN_TEMPLATE', key });
      }, []);

      const handleWizardOpenEdit = useCallback((automation, startStep) => {
        setSelectedThreadId(null);
        wizardDispatch({ type: 'OPEN_EDIT', automation, startStep });
      }, []);

      const handleWizardClose = useCallback(() => {
        wizardDispatch({ type: 'CLOSE' });
      }, []);

      const handleWizardSave = useCallback((draft) => {
        const now = new Date().toISOString();
        if (wizardState.mode === 'edit' && wizardState.sourceAutomationId) {
          const updated = { ...draft, status: 'ACTIVE', updated_at: now };
          setAutomationOverrides((prev) => new Map(prev).set(wizardState.sourceAutomationId, updated));
        } else {
          const newAuto = {
            ...draft,
            id: `auto_runtime_${Date.now()}`,
            status: 'ACTIVE',
            created_at: now,
            updated_at: now,
          };
          setAddedAutomations((prev) => [...prev, newAuto]);
        }
      }, [wizardState.mode, wizardState.sourceAutomationId]);

      const handleAutomationToggle = useCallback((id, status) => {
        setAutomationStatusOverrides((prev) => new Map(prev).set(id, status));
      }, []);

      // LSB 카테고리 변경 시 wizard 종료 — dirty 상태면 confirm 후 닫음
      // + dm_automation 진입/이탈 시 SNS 필터 snapshot/restore (spec §5-9-10)
      const handleSelectCategory = useCallback((cat) => {
        if (wizardState.mode !== null && cat !== 'dm_automation') {
          if (wizardState.isDirty) {
            // dirty → pendingCategoryChange 저장 후 confirm modal 노출
            setPendingCategoryChange(cat);
            return;
          }
          wizardDispatch({ type: 'CLOSE' });
        }
        const prevCat = selectedCategory;
        setSelectedCategory(cat);
        if (selectedThreadId && cat === 'dm_automation') {
          setSelectedThreadId(null);
        }

        if (cat === 'dm_automation' && prevCat !== 'dm_automation') {
          // 진입: 현재 set을 통째로 snapshot 저장 후 비-IG 제거
          setSelectedAccountIds((prev) => {
            snsFilterSnapshotRef.current = new Set(prev);
            const igIds = new Set(
              accounts
                .filter((a) => a.platform === 'instagram')
                .map((a) => a.id)
            );
            return new Set([...prev].filter((id) => igIds.has(id)));
          });
        } else if (prevCat === 'dm_automation' && cat !== 'dm_automation') {
          // 이탈: snapshot restore
          if (snsFilterSnapshotRef.current !== null) {
            setSelectedAccountIds(new Set(snsFilterSnapshotRef.current));
            snsFilterSnapshotRef.current = null;
          }
        }
      }, [wizardState.mode, wizardState.isDirty, selectedThreadId, selectedCategory, accounts]);

      // pendingCategoryChange confirm — 사용자가 "버리고 이동" 선택
      const handlePendingCategoryConfirm = useCallback(() => {
        const cat = pendingCategoryChange;
        setPendingCategoryChange(null);
        wizardDispatch({ type: 'CLOSE' });
        // dm_automation 이탈 처리
        if (selectedCategory === 'dm_automation' && cat !== 'dm_automation') {
          if (snsFilterSnapshotRef.current !== null) {
            setSelectedAccountIds(new Set(snsFilterSnapshotRef.current));
            snsFilterSnapshotRef.current = null;
          }
        }
        setSelectedCategory(cat);
        if (selectedThreadId && cat === 'dm_automation') {
          setSelectedThreadId(null);
        }
      }, [pendingCategoryChange, selectedCategory, selectedThreadId]);

      // pendingCategoryChange 취소 — wizard 유지
      const handlePendingCategoryCancel = useCallback(() => {
        setPendingCategoryChange(null);
      }, []);

      // 전역 스크롤바 자동 숨김 — 스크롤 중에만 .is-scrolling 부여 → CSS thumb 노출
      useEffect(() => {
        const timers = new WeakMap();
        const onScroll = (e) => {
          const el = e.target;
          if (!(el instanceof Element)) return;
          el.classList.add('is-scrolling');
          const prev = timers.get(el);
          if (prev) clearTimeout(prev);
          const t = setTimeout(() => el.classList.remove('is-scrolling'), 700);
          timers.set(el, t);
        };
        document.addEventListener('scroll', onScroll, true);
        return () => document.removeEventListener('scroll', onScroll, true);
      }, []);

      // 일괄 읽음 처리 — processedOverrides에 thread_id 추가
      const handleProcessThreads = useCallback((threadIds) => {
        setProcessedOverrides((prev) => {
          const next = new Set(prev);
          threadIds.forEach((id) => next.add(id));
          return next;
        });
      }, []);

      // 일괄 태그 추가 — threadTagOverrides Map 업데이트
      const handleTagThreads = useCallback((threadIds, tags) => {
        setThreadTagOverrides((prev) => {
          const next = new Map(prev);
          threadIds.forEach((id) => {
            const existing = next.get(id) || [];
            next.set(id, Array.from(new Set([...existing, ...tags])));
          });
          return next;
        });
      }, []);

      // SidePanel 핸들러
      const handleSelectThread = useCallback((threadId) => {
        setSelectedThreadId(threadId);
      }, []);

      const handleCloseSidePanel = useCallback(() => {
        setSelectedThreadId(null);
      }, []);

      const handleSendReply = useCallback((threadId, body) => {
        const { channel, origins, threads } = window.MOCK_DATA;
        const thread = threads.find((t) => t.id === threadId);
        if (!thread) return;
        const origin = origins.find((o) => o.id === thread.origin_id);
        const senderAcc = origin
          ? channel.connected_sns_accounts.find((acc) => acc.id === origin.user_sns_account_id)
          : null;
        const senderId = senderAcc ? senderAcc.account_handle : 'me';
        const now = new Date().toISOString();
        const rand = Math.random().toString(36).slice(2, 7);
        const lastIncoming = (thread.message_ids
          .map((id) => window.MOCK_DATA.messages.find((m) => m.id === id))
          .filter(Boolean)
          .filter((m) => m.direction === 'incoming')
          .slice(-1)[0]) || null;

        const newMsg = {
          id: `m_runtime_${Date.now()}_${rand}`,
          thread_id: threadId,
          sender_id: senderId,
          direction: 'outgoing',
          body,
          attachments: [],
          sent_at: now,
          processed_at: now,
          read_at: null,
          depth: thread.message_type === 'comment' ? 2 : 1,
          parent_message_id: thread.message_type === 'comment' && lastIncoming ? lastIncoming.id : null,
          tags: [],
          ai_context_solo: '',
          ai_context_cumulative: '',
        };

        setOutgoingMessageOverrides((prev) => {
          const next = new Map(prev);
          const existing = next.get(threadId) || [];
          next.set(threadId, [...existing, newMsg]);
          return next;
        });
        // 답장 발송 → 처리 trigger
        setProcessedOverrides((prev) => {
          const next = new Set(prev);
          next.add(threadId);
          return next;
        });
        showToast({ message: '답장을 보냈어요' });
      }, [showToast]);

      const handleIgnoreThread = useCallback((threadId) => {
        setProcessedOverrides((prev) => {
          const next = new Set(prev);
          next.add(threadId);
          return next;
        });
        setSelectedThreadId(null);
        showToast({ message: '스레드를 처리했어요' });
      }, [showToast]);

      const handleArchiveThread = useCallback(() => {
        showToast({ message: '저장함은 준비 중인 기능이에요' });
      }, [showToast]);

      // LSB badge count — override 반영 threads
      const threadsWithOverrides = useMemo(() => {
        const { threads } = window.MOCK_DATA;
        return threads.map((t) => {
          const processed = t.processed || processedOverrides.has(t.id);
          const extra = threadTagOverrides.get(t.id);
          const tags = extra && extra.length ? Array.from(new Set([...t.tags, ...extra])) : t.tags;
          if (processed === t.processed && tags === t.tags) return t;
          return { ...t, processed, tags };
        });
      }, [processedOverrides, threadTagOverrides]);

      // esc로 LSB 닫기 (SidePanel Esc는 SidePanel 내부에서 처리)
      useEffect(() => {
        if (!lsbOpen) return;
        const handleKey = (e) => { if (e.key === 'Escape') handleCloseLsb(); };
        document.addEventListener('keydown', handleKey);
        return () => document.removeEventListener('keydown', handleKey);
      }, [lsbOpen, handleCloseLsb]);

      // 현재 선택된 thread / origin / messages 도출
      const selectedThread = useMemo(() => {
        if (!selectedThreadId) return null;
        return threadsWithOverrides.find((t) => t.id === selectedThreadId) || null;
      }, [selectedThreadId, threadsWithOverrides]);

      const selectedOrigin = useMemo(() => {
        if (!selectedThread) return null;
        return window.MOCK_DATA.origins.find((o) => o.id === selectedThread.origin_id) || null;
      }, [selectedThread]);

      const selectedMessages = useMemo(() => {
        if (!selectedThread) return [];
        return getThreadMessages(selectedThread, outgoingMessageOverrides);
      }, [selectedThread, outgoingMessageOverrides]);

      const panelOpen = !!selectedThreadId;
      const wizardOpen = wizardState.mode !== null;
      // wizard 또는 thread panel이 열린 경우 SidePanel 슬롯 점유
      const sidePanelSlotOpen = (panelOpen || wizardOpen) && !isNarrow;
      const sidePanelOverlay = (panelOpen || wizardOpen) && isNarrow;

      const displayedAutomations = getDisplayedAutomations();

      // dm_automation 뷰 전용 — 활성 IG 계정 ID set + 비-IG disabled set
      const isAutomationView = selectedCategory === 'dm_automation';
      const activeIgAccountIds = useMemo(() => {
        if (!isAutomationView) return null;
        return new Set(
          accounts
            .filter((a) => a.platform === 'instagram' && selectedAccountIds.has(a.id))
            .map((a) => a.id)
        );
      }, [isAutomationView, accounts, selectedAccountIds]);

      const disabledAccountIds = useMemo(() => {
        if (!isAutomationView) return null;
        return new Set(
          accounts
            .filter((a) => a.platform !== 'instagram')
            .map((a) => a.id)
        );
      }, [isAutomationView, accounts]);

      // TopToolbar 뒤로가기 조건: mobile에서 panel 또는 wizard가 열려 있을 때
      const showBackButton = (panelOpen || wizardOpen) && isNarrow;
      const handleTopBarBack = () => {
        if (panelOpen) handleCloseSidePanel();
        else if (wizardOpen) {
          // wizard dirty-check 흐름을 타도록 — ref에 저장된 handleCloseAttempt 호출
          if (wizardCloseAttemptRef.current) wizardCloseAttemptRef.current();
          else handleWizardClose();
        }
      };

      return (
        <div className="app-shell">
          <TopToolbar
            accounts={accounts}
            selectedAccountIds={selectedAccountIds}
            onToggleAccount={handleToggleAccount}
            onToggleAll={handleToggleAll}
            onOpenLsb={handleOpenLsb}
            selectedCategory={selectedCategory}
            showBackButton={showBackButton}
            onCloseSidePanel={handleTopBarBack}
            disabledAccountIds={disabledAccountIds}
          />
          <div className={`app-main${sidePanelSlotOpen ? ' app-main--panel-open' : ' app-main--panel-closed'}`}>
            {/* LSB — PC */}
            <aside className="app-main__lsb">
              <LeftSidebar
                selectedCategory={selectedCategory}
                onSelectCategory={handleSelectCategory}
                threadsOverride={threadsWithOverrides}
              />
            </aside>

            {/* 모바일 LSB 드로어 */}
            {lsbOpen && (
              <>
                <div
                  className="app-main__lsb-drawer-backdrop"
                  onClick={handleCloseLsb}
                  aria-hidden="true"
                />
                <aside className="app-main__lsb-drawer">
                  <div className="app-main__lsb-drawer-header">
                    <span className="app-main__lsb-drawer-header__wordmark">blackplum</span>
                    <button
                      className="tappable"
                      onClick={handleCloseLsb}
                      aria-label="메뉴 닫기"
                    >
                      <Icon name="x" size="md" tone="primary" />
                    </button>
                  </div>
                  <LeftSidebar
                    selectedCategory={selectedCategory}
                    onSelectCategory={handleSelectCategory}
                    onClose={handleCloseLsb}
                    threadsOverride={threadsWithOverrides}
                    hideBrand
                  />
                </aside>
              </>
            )}

            {/* InboxList */}
            <main className="app-main__inbox-list">
              <InboxList
                selectedCategory={selectedCategory}
                selectedAccountIds={selectedAccountIds}
                processedOverrides={processedOverrides}
                threadTagOverrides={threadTagOverrides}
                onProcessThreads={handleProcessThreads}
                onTagThreads={handleTagThreads}
                selectedThreadId={selectedThreadId}
                onSelectThread={handleSelectThread}
                automations={displayedAutomations}
                activeIgAccountIds={activeIgAccountIds}
                onOpenWizardNew={handleWizardOpenNew}
                onOpenWizardTemplate={handleWizardOpenTemplate}
                onOpenWizardEdit={handleWizardOpenEdit}
                onToggleAutomationStatus={handleAutomationToggle}
              />
            </main>

            {/* SidePanel / Wizard — PC: grid 슬롯 inline / Tablet·Mobile: overlay */}
            {sidePanelSlotOpen && (
              <aside className="app-main__side-panel">
                {wizardOpen ? (
                  <MacroBuilderWizard
                    wizardState={wizardState}
                    dispatch={wizardDispatch}
                    onSave={handleWizardSave}
                    onClose={handleWizardClose}
                    igOrigins={activeIgAccountIds ? window.MOCK_DATA.origins.filter(
                      (o) => o.platform === 'instagram' && o.type === 'post' && activeIgAccountIds.has(o.user_sns_account_id)
                    ) : undefined}
                    onCloseAttemptRef={wizardCloseAttemptRef}
                  />
                ) : panelOpen ? (
                  <SidePanel
                    thread={selectedThread}
                    origin={selectedOrigin}
                    messages={selectedMessages}
                    onClose={handleCloseSidePanel}
                    onIgnore={() => handleIgnoreThread(selectedThreadId)}
                    onArchive={handleArchiveThread}
                    onSendReply={handleSendReply}
                    isOverlay={false}
                  />
                ) : null}
              </aside>
            )}
            {sidePanelOverlay && (
              <>
                {wizardOpen ? (
                  <div className="side-panel side-panel--overlay">
                    <div className="side-panel__overlay-backdrop" onClick={() => { if (wizardCloseAttemptRef.current) wizardCloseAttemptRef.current(); else handleWizardClose(); }} aria-hidden="true" />
                    <div className="side-panel__overlay-body">
                      <MacroBuilderWizard
                        wizardState={wizardState}
                        dispatch={wizardDispatch}
                        onSave={handleWizardSave}
                        onClose={handleWizardClose}
                        igOrigins={activeIgAccountIds ? window.MOCK_DATA.origins.filter(
                          (o) => o.platform === 'instagram' && o.type === 'post' && activeIgAccountIds.has(o.user_sns_account_id)
                        ) : undefined}
                        onCloseAttemptRef={wizardCloseAttemptRef}
                      />
                    </div>
                  </div>
                ) : panelOpen ? (
                  <SidePanel
                    thread={selectedThread}
                    origin={selectedOrigin}
                    messages={selectedMessages}
                    onClose={handleCloseSidePanel}
                    onIgnore={() => handleIgnoreThread(selectedThreadId)}
                    onArchive={handleArchiveThread}
                    onSendReply={handleSendReply}
                    isOverlay={true}
                  />
                ) : null}
              </>
            )}
          </div>

          {/* 카테고리 변경 시 dirty wizard 닫기 confirm (F-1) */}
          <Modal
            isOpen={pendingCategoryChange !== null}
            onClose={handlePendingCategoryCancel}
            title="변경사항 버리기"
          >
            <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--gap-stack-md)' }}>
              <p className="t-body">변경사항을 버리고 다른 카테고리로 이동할까요? 저장되지 않은 내용은 사라져요.</p>
              <div style={{ display: 'flex', gap: 'var(--gap-inline-sm)', justifyContent: 'flex-end' }}>
                <button type="button" className="wizard-button--secondary" onClick={handlePendingCategoryCancel}>취소</button>
                <button type="button" className="wizard-button--primary" onClick={handlePendingCategoryConfirm}>버리고 이동</button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    /* ================================================================
     * LandingScreen — spec.md §5-1
     * ================================================================ */
    function LandingScreen({ onStart }) {
      const snsButtons = [
        { key: 'google', label: 'Google로 시작하기', icon: 'logo-gmail' },
        { key: 'naver',  label: 'Naver로 시작하기',  icon: 'logo-naver-mail' },
        { key: 'kakao',  label: 'Kakao로 시작하기',  icon: null },
        { key: 'apple',  label: 'Apple로 시작하기',  icon: null },
      ];

      return (
        <div className="landing-screen">
          <div className="landing-screen__inner">
            <div className="landing-screen__brand">
              <span className="t-display-md landing-screen__wordmark">blackplum</span>
              <h1 className="t-display-xl landing-screen__headline">
                받은편지함이 아닌{' '}
                <span className="landing-screen__highlight">업무 큐</span>
              </h1>
              <p className="t-body-lg landing-screen__sub">
                인스타 DM·댓글, 유튜브 댓글, 메일까지 — 처리할 일만 골라드려요
              </p>
            </div>
            <div className="landing-screen__buttons stack-y-md">
              {snsButtons.map(({ key, label, icon }) => (
                <button
                  key={key}
                  className="landing-screen__button t-button tappable"
                  onClick={onStart}
                >
                  {icon && window.ICON_SET[icon] && (
                    <Icon name={icon} size="md" tone="inherit" />
                  )}
                  <span>{label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================
     * App — 최상위 라우터 (spec.md §2-4)
     * ================================================================ */
    function App() {
      const [currentScreen, setCurrentScreen] = useState('landing');

      return (
        <ToastProvider>
          {currentScreen === 'landing' && (
            <LandingScreen onStart={() => setCurrentScreen('main')} />
          )}
          {currentScreen === 'main' && (
            <MainScreen />
          )}
        </ToastProvider>
      );
    }

    /* ================================================================
     * Mount
     * ================================================================ */
    const rootEl = document.getElementById('root');
    ReactDOM.createRoot(rootEl).render(<App />);
  </script>
</body>
</html>
