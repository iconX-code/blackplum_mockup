<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>blackplum</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- 의존 스크립트 로드 순서: icon-set → mock-data → React UMD → babel 블록 -->
  <script src="icon-set.js"></script>
  <script src="mock-data.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const {
      useState, useEffect, useRef, useMemo,
      useCallback, useContext, createContext,
      useReducer,
    } = React;

    /* ================================================================
     * Icon — spec.md §3-6-3
     * ================================================================ */
    function Icon({ name, size = 'md', tone = 'inherit' }) {
      const inner = window.ICON_SET[name];
      if (!inner) return null;
      const cls = `icon icon--${size} icon--tone-${tone}`;
      return (
        <svg
          className={cls}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          dangerouslySetInnerHTML={{ __html: inner }}
        />
      );
    }

    /* ================================================================
     * Toast — spec.md §5-8
     * ================================================================ */
    const ToastContext = createContext(null);

    function ToastProvider({ children }) {
      const [toast, setToast] = useState(null);
      const timerRef = useRef(null);

      const showToast = useCallback(({ message, tone = 'default' }) => {
        if (timerRef.current) clearTimeout(timerRef.current);
        setToast({ message, tone, key: Date.now() });
        timerRef.current = setTimeout(() => setToast(null), 2000);
      }, []);

      useEffect(() => () => { if (timerRef.current) clearTimeout(timerRef.current); }, []);

      return (
        <ToastContext.Provider value={showToast}>
          {children}
          {toast && (
            <div
              key={toast.key}
              className={`toast toast--${toast.tone} toast--enter`}
              role="status"
              aria-live="polite"
            >
              {toast.message}
            </div>
          )}
        </ToastContext.Provider>
      );
    }

    function useToast() {
      return useContext(ToastContext);
    }

    /* ================================================================
     * Modal — spec.md §5-8
     * ================================================================ */
    function Modal({ isOpen, onClose, title, children, centered }) {
      const dialogRef = useRef(null);

      useEffect(() => {
        if (!isOpen) return;
        const previous = document.activeElement;
        dialogRef.current && dialogRef.current.focus();

        const handleKey = (e) => {
          if (e.key === 'Escape') onClose();
          if (e.key === 'Tab' && dialogRef.current) {
            const focusable = dialogRef.current.querySelectorAll(
              'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
            );
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (e.shiftKey ? document.activeElement === first : document.activeElement === last) {
              e.preventDefault();
              (e.shiftKey ? last : first).focus();
            }
          }
        };
        document.addEventListener('keydown', handleKey);
        return () => {
          document.removeEventListener('keydown', handleKey);
          previous && previous.focus();
        };
      }, [isOpen, onClose]);

      if (!isOpen) return null;

      return (
        <div className={`modal${centered ? ' modal--center' : ''}`}>
          <div
            className="modal__backdrop"
            onClick={onClose}
            aria-hidden="true"
          />
          <div
            ref={dialogRef}
            className="modal__dialog"
            role="dialog"
            aria-modal="true"
            aria-labelledby="modal-title"
            tabIndex={-1}
          >
            <div className="modal__header">
              <span id="modal-title" className="modal__title t-h3">{title}</span>
              <button
                className="modal__close tappable"
                onClick={onClose}
                aria-label="닫기"
              >
                <Icon name="x" size="md" tone="primary" />
              </button>
            </div>
            <div className="modal__body">
              {children}
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================
     * Popover — spec.md §5-8
     * ================================================================ */
    function Popover({ isOpen, onClose, anchorRef, position = 'bottom-start', withBackdrop = false, children }) {
      const popoverRef = useRef(null);
      const [coords, setCoords] = useState({ top: 0, left: 0 });

      useEffect(() => {
        if (!isOpen || !anchorRef.current) return;
        const rect = anchorRef.current.getBoundingClientRect();
        const top = rect.bottom + 4;
        const left = position === 'bottom-end'
          ? rect.right
          : rect.left;
        setCoords({ top, left });
      }, [isOpen, anchorRef, position]);

      useEffect(() => {
        if (!isOpen || withBackdrop) return;
        const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
        const handleClick = (e) => {
          if (popoverRef.current && !popoverRef.current.contains(e.target) &&
              anchorRef.current && !anchorRef.current.contains(e.target)) {
            onClose();
          }
        };
        document.addEventListener('keydown', handleKey);
        document.addEventListener('mousedown', handleClick);
        return () => {
          document.removeEventListener('keydown', handleKey);
          document.removeEventListener('mousedown', handleClick);
        };
      }, [isOpen, onClose, anchorRef, withBackdrop]);

      useEffect(() => {
        if (!isOpen || !withBackdrop) return;
        const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', handleKey);
        return () => { document.removeEventListener('keydown', handleKey); };
      }, [isOpen, onClose, withBackdrop]);

      if (!isOpen) return null;

      const posClass = position === 'bottom-end' ? 'popover--bottom-end' : 'popover--bottom-start';

      return (
        <>
          {withBackdrop && <div className="popover__backdrop" onClick={onClose} />}
          <div
            ref={popoverRef}
            className={`popover ${posClass}`}
            style={{ top: coords.top, left: coords.left }}
          >
            {children}
          </div>
        </>
      );
    }

    /* ================================================================
     * EmptyState — spec.md §5-8
     * ================================================================ */
    function EmptyState({ icon, title, description, action }) {
      return (
        <div className="empty-state">
          {icon && (
            <div className="empty-state__icon">
              <Icon name={icon} size="lg" tone="muted" />
            </div>
          )}
          <p className="empty-state__title t-display-md">{title}</p>
          {description && (
            <p className="empty-state__desc t-body">{description}</p>
          )}
          {action && (
            <div className="empty-state__action">{action}</div>
          )}
        </div>
      );
    }

    /* ================================================================
     * TopToolbar — spec.md §5-4
     * ================================================================ */
    function TopToolbar({ accounts, selectedAccountIds, onToggleAccount, onToggleAll, onOpenLsb, selectedCategory, showBackButton, onCloseSidePanel, disabledAccountIds }) {
      const showToast = useToast();
      const [addModalOpen, setAddModalOpen] = useState(false);
      const [snsFilterPopoverOpen, setSnsFilterPopoverOpen] = useState(false);
      const PLATFORM_LOGOS = window.MOCK_DATA.PLATFORM_LOGOS;
      const CATEGORIES = window.MOCK_DATA.CATEGORIES;
      const connectedBtnRef = useRef(null);

      const handleSearchClick = () => {
        showToast({ message: '검색은 Phase 6에서 구현 예정이에요.' });
      };

      const handleAddAccount = () => {
        setSnsFilterPopoverOpen(false);
        setAddModalOpen(true);
      };

      const allActive = selectedAccountIds.size === accounts.length;
      const categoryLabel = CATEGORIES[selectedCategory] ? CATEGORIES[selectedCategory].display : selectedCategory;

      // chip 렌더 헬퍼 — isAutomationView(disabledAccountIds 존재) 시 비-IG disabled 처리
      const renderAccountChip = (account, key) => {
        const logoIcon = PLATFORM_LOGOS[account.platform];
        const isActive = selectedAccountIds.has(account.id);
        const isDisabled = disabledAccountIds ? disabledAccountIds.has(account.id) : false;
        const chipStyle = account.accent_color
          ? { borderColor: account.accent_color }
          : {};

        return (
          <button
            key={key || account.id}
            className={`top-toolbar__chip tappable${isActive ? ' top-toolbar__chip--active' : ''}${isDisabled ? ' top-toolbar__chip--disabled' : ''}`}
            onClick={isDisabled ? undefined : () => onToggleAccount(account.id)}
            aria-pressed={isActive}
            aria-disabled={isDisabled || undefined}
            aria-label={account.display_name}
            style={chipStyle}
          >
            <span className="top-toolbar__chip-icon-cell">
              {logoIcon
                ? <Icon name={logoIcon} size="sm" tone="inherit" />
                : <span className="top-toolbar__chip-initial">{account.initial || account.display_name[0]}</span>
              }
            </span>
            <span className="top-toolbar__chip-label-cell">
              <span>{account.display_name}</span>
            </span>
          </button>
        );
      };

      return (
        <header className="top-toolbar safe-area-top">
          {/* 좌측: 햄버거 / 뒤로가기 morph */}
          <button
            type="button"
            className={`top-toolbar__hamburger tappable${showBackButton ? ' top-toolbar__hamburger--back-mode' : ''}`}
            onClick={showBackButton ? onCloseSidePanel : onOpenLsb}
            aria-label={showBackButton ? '뒤로가기' : '메뉴 열기'}
          >
            <span className="top-toolbar__hamburger-icon top-toolbar__hamburger-icon--menu" aria-hidden="true">
              <Icon name="menu" size="md" tone="primary" />
            </span>
            <span className="top-toolbar__hamburger-icon top-toolbar__hamburger-icon--back" aria-hidden="true">
              <Icon name="chevron-left" size="md" tone="primary" />
            </span>
          </button>

          {/* 가운데: 현재 카테고리명 — Tablet/Mobile에서만 표시 (≤1023px) */}
          <span className="top-toolbar__category-label" aria-live="polite">{categoryLabel}</span>

          {/* 워드마크 — PC에서만 표시 (≥1024px) */}
          <span className="top-toolbar__wordmark">blackplum</span>

          {/* 글로벌 SNS 필터 chips — PC에서만 표시 (≥1024px) */}
          <div className="top-toolbar__filter" role="group" aria-label="SNS 계정 필터">
            {/* 전체 토글 chip — automation view에서는 숨김 */}
            {!disabledAccountIds && (
              <button
                className={`top-toolbar__chip top-toolbar__chip--all tappable${allActive ? ' top-toolbar__chip--active' : ''}`}
                onClick={onToggleAll}
                aria-pressed={allActive}
                aria-label={allActive ? '전체 해제' : '전체 선택'}
              >
                <span className="top-toolbar__chip-icon-cell">
                  <Icon name={allActive ? 'circle-check' : 'circle'} size="sm" tone="inherit" />
                </span>
                <span className="top-toolbar__chip-label-cell">
                  <span>전체</span>
                </span>
              </button>
            )}

            {accounts.map((account) => renderAccountChip(account))}
          </div>

          {/* 우측: 연결 계정 버튼 + 검색 (Tablet/Mobile) / (+) + 검색 (PC) */}
          <div className="top-toolbar__actions">
            {/* 연결 계정 버튼 — Tablet/Mobile에서만 표시 (≤1023px) */}
            <button
              ref={connectedBtnRef}
              className="top-toolbar__connected-accounts-btn tappable"
              onClick={() => setSnsFilterPopoverOpen(true)}
              aria-label="연결 계정 필터"
              aria-expanded={snsFilterPopoverOpen}
            >
              <Icon name="link" size="sm" tone="primary" />
              <span>연결 계정</span>
            </button>

            {/* (+) SNS 추가 버튼 — PC에서만 표시 (≥1024px) */}
            <button
              className="top-toolbar__action-button top-toolbar__action-button--add-sns tappable"
              onClick={() => setAddModalOpen(true)}
              aria-label="SNS 계정 추가"
            >
              <Icon name="plus" size="md" tone="primary" />
            </button>

            <button
              className="top-toolbar__action-button tappable"
              onClick={handleSearchClick}
              aria-label="검색"
            >
              <Icon name="search" size="md" tone="primary" />
            </button>
          </div>

          {/* SNS 계정 추가 모달 */}
          <Modal
            isOpen={addModalOpen}
            onClose={() => setAddModalOpen(false)}
            title="SNS 계정 추가하기"
          >
            <div className="stack-y-md">
              <p className="t-body">준비 중인 기능이에요.</p>
              <p className="t-body" style={{ color: 'var(--color-text-secondary)' }}>
                곧 Instagram, YouTube, TikTok, 메일 계정을 간편하게 연결할 수 있어요.
              </p>
              <button
                className="modal__primary-button t-button"
                onClick={() => setAddModalOpen(false)}
              >
                확인
              </button>
            </div>
          </Modal>

          {/* SNS 필터 Popover — 연결 계정 버튼 하단에 anchor */}
          <Popover
            isOpen={snsFilterPopoverOpen}
            onClose={() => setSnsFilterPopoverOpen(false)}
            anchorRef={connectedBtnRef}
            position="bottom-end"
            withBackdrop
          >
            <div className="sns-filter-popover">
              <div className="sns-filter-modal__chips">
                {/* 전체 토글 — automation view에서는 숨김 */}
                {!disabledAccountIds && (
                  <button
                    className={`top-toolbar__chip top-toolbar__chip--all tappable${allActive ? ' top-toolbar__chip--active' : ''}`}
                    onClick={onToggleAll}
                    aria-pressed={allActive}
                    aria-label={allActive ? '전체 해제' : '전체 선택'}
                  >
                    <span className="top-toolbar__chip-icon-cell">
                      <Icon name={allActive ? 'circle-check' : 'circle'} size="sm" tone="inherit" />
                    </span>
                    <span className="top-toolbar__chip-label-cell">
                      <span>전체</span>
                    </span>
                  </button>
                )}

                {/* 계정별 chip */}
                {accounts.map((account) => renderAccountChip(account, account.id + '_popover'))}

                {/* (+) 추가 버튼 */}
                <button
                  className="sns-filter-modal__add-btn tappable"
                  onClick={handleAddAccount}
                  aria-label="SNS 계정 추가"
                >
                  <Icon name="plus" size="sm" tone="inherit" />
                </button>
              </div>
            </div>
          </Popover>
        </header>
      );
    }

    /* ================================================================
     * 유틸리티 함수 — Phase 3
     * ================================================================ */

    // 카테고리 필터 매칭 (spec.md §6-7)
    function categoryFilter(cat, thread) {
      if (cat.tag_filter === '*')        return true;
      if (cat.tag_filter === 'untagged') return thread.tags.length === 0;
      if (Array.isArray(cat.tag_filter)) return cat.tag_filter.some((t) => thread.tags.includes(t));
      if (cat.view)                      return false;
      return false;
    }

    // badge count 계산 (SNS 필터 무시)
    function calcBadge(catKey, CATEGORIES, threads) {
      const cat = CATEGORIES[catKey];
      if (!cat) return 0;
      return threads.filter((t) => !t.processed && categoryFilter(cat, t)).length;
    }

    // 메시지 타입 라벨
    function msgTypeLabel(messageType) {
      if (messageType === 'dm')      return 'DM';
      if (messageType === 'comment') return '댓글';
      if (messageType === 'email')   return '메일';
      return messageType;
    }

    // 상대 시각 표시 (last_message_at)
    function relativeTime(isoString) {
      const now = new Date();
      const then = new Date(isoString);
      const diffMs = now - then;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHr  = Math.floor(diffMs / 3600000);
      const diffDay = Math.floor(diffMs / 86400000);

      if (diffMin < 1)  return '방금 전';
      if (diffMin < 60) return `${diffMin}분 전`;
      if (diffDay === 0) {
        // 오늘 — 시각 표시
        const h = then.getHours();
        const m = String(then.getMinutes()).padStart(2, '0');
        const ampm = h < 12 ? '오전' : '오후';
        const h12 = h % 12 || 12;
        return `오늘 ${ampm} ${h12}:${m}`;
      }
      if (diffDay === 1) return '어제';
      if (diffDay < 7)   return `${diffDay}일 전`;
      if (diffHr < 24 * 30) return `${Math.floor(diffDay / 7)}주 전`;
      return `${Math.floor(diffDay / 30)}달 전`;
    }

    /* ================================================================
     * LeftSidebar — spec.md §5-3
     * ================================================================ */
    const LSB_ITEMS = [
      { key: 'ai_pick',       icon: 'category-ai-pick',       showBadge: true },
      { key: '__divider1__',  type: 'divider' },
      { key: 'business',      icon: 'category-business',      showBadge: true },
      { key: 'ops',           icon: 'category-ops',           showBadge: true },
      { key: 'social',        icon: 'category-social',        showBadge: true },
      { key: 'direct_check',  icon: 'category-direct-check',  showBadge: true },
      { key: '__divider2__',  type: 'divider' },
      { key: 'sent',          icon: 'category-sent',          showBadge: false },
      { key: '__section__',   type: 'section' },
      { key: 'dm_automation', icon: 'category-dm-automation', showBadge: false },
    ];

    function LeftSidebar({ selectedCategory, onSelectCategory, onClose, threadsOverride, hideBrand }) {
      const { channel, threads, CATEGORIES } = window.MOCK_DATA;
      const effectiveThreads = threadsOverride || threads;

      return (
        <div className="lsb">
          {/* CI/BI 영역 — hideBrand 시 숨김 (drawer 헤더에서 대신 표시) */}
          {!hideBrand && (
            <div className="lsb__brand">
              <span className="lsb__brand-wordmark">blackplum</span>
            </div>
          )}

          {/* 카테고리 리스트 */}
          <nav className="lsb__nav" aria-label="카테고리">
            {LSB_ITEMS.map((item) => {
              if (item.type === 'divider') {
                return <div key={item.key} className="lsb__divider" aria-hidden="true" />;
              }
              if (item.type === 'section') {
                return <div key={item.key} className="lsb__section-divider" aria-hidden="true" />;
              }
              const cat = CATEGORIES[item.key];
              const isActive = selectedCategory === item.key;
              const badge = item.showBadge ? calcBadge(item.key, CATEGORIES, effectiveThreads) : 0;

              return (
                <button
                  key={item.key}
                  className={`lsb__category${isActive ? ' lsb__category--active' : ''}`}
                  onClick={() => {
                    onSelectCategory(item.key);
                    if (onClose) onClose();
                  }}
                  aria-current={isActive ? 'page' : undefined}
                >
                  <span className="lsb__category-icon">
                    <Icon
                      name={item.icon}
                      size="md"
                      tone={isActive ? 'inverse' : 'muted'}
                    />
                  </span>
                  <span className="lsb__category-label">{cat ? cat.display : item.key}</span>
                  {badge > 0 && (
                    <span className="lsb__category-badge">{badge}</span>
                  )}
                </button>
              );
            })}
          </nav>

          {/* 프로필 영역 */}
          <div className="lsb__profile">
            <div className="lsb__profile-avatar">
              <span className="lsb__profile-initial">
                {channel.user_display_name ? channel.user_display_name[0] : '?'}
              </span>
            </div>
            <span className="lsb__profile-name">{channel.user_display_name || channel.channel_display_name}</span>
          </div>
        </div>
      );
    }

    /* ================================================================
     * PreviewCard — Type1 (비즈니스) / Type2 (기본)
     * ================================================================ */
    function PreviewCard({ thread, selectionMode, isSelected, onCardClick, onCheckboxClick, isActive }) {
      const { origins, messages, CATEGORIES } = window.MOCK_DATA;
      const longPressRef = useRef(null);
      const [pressing, setPressing] = useState(false);
      const PLATFORM_LOGOS = window.MOCK_DATA.PLATFORM_LOGOS;

      const origin = origins.find((o) => o.id === thread.origin_id);
      const lastMsg = messages.find((m) => m.id === thread.message_ids[thread.message_ids.length - 1]);

      // 썸네일
      const thumbUrl = origin && origin.type === 'post'
        ? origin.post_meta && origin.post_meta.thumbnail_url
        : null;
      const thumbInitial = origin
        ? origin.display_name[0]
        : '?';

      // 플랫폼 로고
      const platformLogoKey = PLATFORM_LOGOS[thread.platform] || null;

      // 썸네일 border color — 동적 (accent_color 또는 platform token)
      const thumbBorderStyle = { borderColor: `var(--color-platform-${thread.platform === 'naver_mail' ? 'naver' : thread.platform === 'other_mail' ? 'mail' : thread.platform})` };

      const handleClick = () => {
        if (onCardClick) onCardClick(thread.id);
      };

      const handleCheckboxClick = (e) => {
        e.stopPropagation();
        if (onCheckboxClick) onCheckboxClick(thread.id);
      };

      // 모바일 long-press 핸들러
      const handleTouchStart = (_e) => {
        if (selectionMode) return; // 이미 선택 모드면 long-press 불필요
        setPressing(true);
        longPressRef.current = setTimeout(() => {
          setPressing(false);
          if (onCheckboxClick) onCheckboxClick(thread.id);
        }, 500);
      };

      const handleTouchEnd = () => {
        setPressing(false);
        clearTimeout(longPressRef.current);
      };

      const handleTouchMove = () => {
        setPressing(false);
        clearTimeout(longPressRef.current);
      };

      const stackedClass = thread.is_stacked ? ' preview-card--stacked' : '';
      const selectableClass = ' preview-card--selectable';
      const selectedClass = isSelected ? ' preview-card--selected' : '';
      const selectionModeClass = selectionMode ? ' preview-card--selection-mode-on' : '';
      const pressingClass = pressing ? ' preview-card--pressing' : '';
      const activeClass = isActive ? ' preview-card--active' : '';

      return (
        <button
          className={`preview-card${stackedClass}${selectableClass}${selectedClass}${selectionModeClass}${pressingClass}${activeClass}`}
          onClick={handleClick}
          onTouchStart={handleTouchStart}
          onTouchEnd={handleTouchEnd}
          onTouchMove={handleTouchMove}
          type="button"
        >
          {/* 체크박스 (선택 모드 or hover 시 노출) */}
          <span
            className="preview-card__checkbox"
            onClick={handleCheckboxClick}
            role="checkbox"
            aria-checked={isSelected}
            aria-label="스레드 선택"
          >
            <Icon name={isSelected ? 'square-check' : 'square'} size="md" tone="inherit" />
          </span>

          {/* 썸네일 */}
          <div className="preview-card__thumb">
            {thumbUrl ? (
              <img
                className="preview-card__thumb-img"
                src={thumbUrl}
                alt={origin ? origin.display_name : ''}
                style={thumbBorderStyle}
              />
            ) : (
              <div className="preview-card__thumb-initial" style={thumbBorderStyle}>
                {thumbInitial}
              </div>
            )}
            {platformLogoKey && (
              <div className="preview-card__thumb-platform">
                <Icon name={platformLogoKey} size="sm" tone="inherit" />
              </div>
            )}
          </div>

          {/* 본문 */}
          <div className="preview-card__body">
            <PreviewCardType2Body thread={thread} origin={origin} lastMsg={lastMsg} />
          </div>
        </button>
      );
    }

    const AI_PICK_PRIORITY_THRESHOLD = 85;

    function PreviewCardType2Body({ thread, origin, lastMsg }) {
      const senderName = origin ? origin.display_name : '알 수 없음';
      const preview = lastMsg ? lastMsg.body : '';
      const isAiPick = thread.priority_score >= AI_PICK_PRIORITY_THRESHOLD;
      const typeLabelClass = `preview-card__type-label preview-card__type-label--${thread.message_type === 'email' ? 'mail' : thread.message_type}`;

      return (
        <>
          <div className="preview-card__body-row">
            <span className="preview-card__sender">
              {isAiPick && <Icon name="sparkle" size="sm" tone="accent" />}
              <span className="preview-card__sender-text">{senderName}</span>
            </span>
            <span className="preview-card__time">{relativeTime(thread.last_message_at)}</span>
          </div>
          <span className={typeLabelClass}>{msgTypeLabel(thread.message_type)}</span>
          {preview && (
            <p className="preview-card__preview">{preview}</p>
          )}
          <TagChips tags={thread.tags} max={3} />
        </>
      );
    }

    // 태그 chip 목록
    function TagChips({ tags, max }) {
      const visible = tags.slice(0, max);
      const more = tags.length - visible.length;
      if (tags.length === 0) return null;
      return (
        <div className="preview-card__tags">
          {visible.map((tag) => (
            <span key={tag} className="preview-card__tag">{tag}</span>
          ))}
          {more > 0 && (
            <span className="preview-card__tag">+{more}</span>
          )}
        </div>
      );
    }

    /* ================================================================
     * SentMessageCard — sent 카테고리용 outgoing 메시지 카드
     * ================================================================ */
    function SentMessageCard({ msg, onSelectThread }) {
      const { origins, threads } = window.MOCK_DATA;
      const PLATFORM_LOGOS = window.MOCK_DATA.PLATFORM_LOGOS;

      // 메시지로부터 thread → origin 조회
      const thread = threads.find((t) => t.id === msg.thread_id);
      const origin = thread ? origins.find((o) => o.id === thread.origin_id) : null;
      const platformLogoKey = thread ? (PLATFORM_LOGOS[thread.platform] || null) : null;

      const thumbInitial = origin ? origin.display_name[0] : '?';
      const thumbBorderStyle = thread
        ? { borderColor: `var(--color-platform-${thread.platform === 'naver_mail' ? 'naver' : thread.platform === 'other_mail' ? 'mail' : thread.platform})` }
        : {};

      const handleClick = () => {
        if (thread && onSelectThread) onSelectThread(thread.id);
      };

      return (
        <button
          className="preview-card preview-card--sent"
          onClick={handleClick}
          type="button"
        >
          <div className="preview-card__thumb">
            <div className="preview-card__thumb-initial" style={thumbBorderStyle}>
              {thumbInitial}
            </div>
            {platformLogoKey && (
              <div className="preview-card__thumb-platform">
                <Icon name={platformLogoKey} size="sm" tone="inherit" />
              </div>
            )}
          </div>
          <div className="preview-card__body">
            <div className="preview-card__body-row">
              <span className="preview-card__sender">{origin ? origin.display_name : '알 수 없음'}</span>
              <span className="preview-card__time">{relativeTime(msg.sent_at)}</span>
            </div>
            {thread && (
              <span className="preview-card__type-label">{msgTypeLabel(thread.message_type)}</span>
            )}
            <p className="preview-card__preview">{msg.body}</p>
          </div>
        </button>
      );
    }

    /* ================================================================
     * BulkActionBar — 선택 모드 일괄 액션 바
     * ================================================================ */
    function BulkActionBar({ count, onClose, onMarkRead, onTagApply }) {
      return (
        <div className="bulk-action-bar">
          <div className="bulk-action-bar__left">
            <button
              className="bulk-action-bar__close"
              onClick={onClose}
              type="button"
              aria-label="선택 모드 종료"
            >
              <Icon name="x" size="md" tone="inverse" />
            </button>
            <span className="bulk-action-bar__count">{count}개 선택됨</span>
          </div>
          <div className="bulk-action-bar__actions">
            <button
              className="bulk-action-bar__btn"
              onClick={onMarkRead}
              type="button"
              disabled={count === 0}
            >
              읽음처리
            </button>
            <button
              className="bulk-action-bar__btn"
              onClick={onTagApply}
              type="button"
              disabled={count === 0}
            >
              태그 추가
            </button>
          </div>
        </div>
      );
    }

    /* ================================================================
     * BulkTagModal — 일괄 태그 추가 Modal
     * ================================================================ */
    function BulkTagModal({ isOpen, onClose, onApply }) {
      const { TAG_CATALOG } = window.MOCK_DATA;
      const [pendingTags, setPendingTags] = useState(() => new Set());

      // Modal 열릴 때마다 선택 초기화
      useEffect(() => {
        if (isOpen) setPendingTags(new Set());
      }, [isOpen]);

      const toggleTag = useCallback((tag) => {
        setPendingTags((prev) => {
          const next = new Set(prev);
          if (next.has(tag)) next.delete(tag);
          else next.add(tag);
          return next;
        });
      }, []);

      const handleApply = () => {
        if (pendingTags.size === 0) return;
        onApply([...pendingTags]);
      };

      const groups = [
        { key: 'business', label: '비즈니스', tags: TAG_CATALOG.business },
        { key: 'ops',      label: '운영/CS',  tags: TAG_CATALOG.ops },
        { key: 'social',   label: '소통',      tags: TAG_CATALOG.social },
        { key: 'manual',   label: '수동 태그', tags: TAG_CATALOG.manual },
      ];

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="태그 일괄 추가">
          <div className="bulk-tag-modal">
            {groups.map(({ key, label, tags }) => (
              <div key={key} className="bulk-tag-modal__group">
                <span className="bulk-tag-modal__group-label">{label}</span>
                <div className="bulk-tag-modal__chips">
                  {tags.map((tag) => (
                    <button
                      key={tag}
                      type="button"
                      className={`bulk-tag-modal__chip${pendingTags.has(tag) ? ' bulk-tag-modal__chip--selected' : ''}`}
                      onClick={() => toggleTag(tag)}
                      aria-pressed={pendingTags.has(tag)}
                    >
                      {tag}
                    </button>
                  ))}
                </div>
              </div>
            ))}
            <button
              type="button"
              className="bulk-tag-modal__apply-btn"
              onClick={handleApply}
              disabled={pendingTags.size === 0}
            >
              {pendingTags.size > 0 ? `${pendingTags.size}개 태그 추가` : '태그를 선택하세요'}
            </button>
          </div>
        </Modal>
      );
    }

    /* ================================================================
     * InboxList — spec.md §5-5
     * ================================================================ */
    function InboxList({ selectedCategory, selectedAccountIds, processedOverrides, threadTagOverrides, onProcessThreads, onTagThreads, selectedThreadId, onSelectThread, automations, activeIgAccountIds, onOpenWizardNew, onOpenWizardTemplate, onOpenWizardEdit, onToggleAutomationStatus }) {
      const { threads, origins, messages, CATEGORIES, TAG_CATALOG } = window.MOCK_DATA;
      const showToast = useToast();
      const [sortMode, setSortMode] = useState('priority'); // 'priority' | 'latest'
      const [activeTagFilters, setActiveTagFilters] = useState(() => new Set());
      const [selectionMode, setSelectionMode] = useState(false);
      const [selectedThreadIds, setSelectedThreadIds] = useState(() => new Set());
      const [tagModalOpen, setTagModalOpen] = useState(false);
      const [sortPopoverOpen, setSortPopoverOpen] = useState(false);
      const sortBtnRef = useRef(null);

      // 카테고리 변경 시 태그 필터 + 선택 모드 초기화
      useEffect(() => {
        setActiveTagFilters(new Set());
        setSelectionMode(false);
        setSelectedThreadIds(new Set());
      }, [selectedCategory]);

      const cat = CATEGORIES[selectedCategory];

      // applyOverrides: processedOverrides + threadTagOverrides 를 thread에 반영
      const applyOverrides = useCallback((thread) => {
        const processed = thread.processed || processedOverrides.has(thread.id);
        const extraTags = threadTagOverrides.get(thread.id) || [];
        const tags = extraTags.length
          ? Array.from(new Set([...thread.tags, ...extraTags]))
          : thread.tags;
        if (processed === thread.processed && tags === thread.tags) return thread;
        return { ...thread, processed, tags };
      }, [processedOverrides, threadTagOverrides]);

      // type chip 고정 목록 (direct_check / sent 전용)
      const TYPE_CHIPS = [
        { key: 'dm',      label: 'DM' },
        { key: 'comment', label: '댓글' },
        { key: 'email',   label: '메일' },
      ];

      // chipMode: 'type' → message_type 기반 chip, 'tag' → 자동분류 태그 chip
      const chipMode = (selectedCategory === 'direct_check' || selectedCategory === 'sent')
        ? 'type'
        : 'tag';

      // TagFilterBar에 노출할 태그 목록 (tag 모드 전용)
      const availableTags = useMemo(() => {
        if (!cat) return [];
        if (selectedCategory === 'ai_pick') {
          return [...TAG_CATALOG.business, ...TAG_CATALOG.ops, ...TAG_CATALOG.social];
        }
        if (Array.isArray(cat.tag_filter)) return cat.tag_filter;
        return [];
      }, [selectedCategory, cat, TAG_CATALOG]);

      // chip 항목: tag 모드는 availableTags, type 모드는 TYPE_CHIPS 고정
      const chipItems = chipMode === 'type'
        ? TYPE_CHIPS
        : availableTags.map((tag) => ({ key: tag, label: tag }));

      // 대상 thread 필터링 (override 반영)
      const filteredThreads = useMemo(() => {
        if (!cat || selectedCategory === 'sent' || selectedCategory === 'dm_automation') return [];

        let list = threads
          .map(applyOverrides)
          .filter((t) => {
            if (t.processed) return false;
            // SNS 필터 적용
            const origin = origins.find((o) => o.id === t.origin_id);
            if (!origin || !selectedAccountIds.has(origin.user_sns_account_id)) return false;
            // 카테고리 필터
            if (!categoryFilter(cat, t)) return false;
            // chip 필터 — tag 모드: thread.tags 매칭 / type 모드: message_type 매칭
            if (activeTagFilters.size > 0) {
              if (chipMode === 'type') {
                if (!activeTagFilters.has(t.message_type)) return false;
              } else {
                const hasTag = [...activeTagFilters].some((tag) => t.tags.includes(tag));
                if (!hasTag) return false;
              }
            }
            return true;
          });

        // 정렬
        if (sortMode === 'latest') {
          list = [...list].sort((a, b) => b.last_message_at.localeCompare(a.last_message_at));
        } else {
          list = [...list].sort((a, b) => b.priority_score - a.priority_score);
        }
        return list;
      }, [threads, origins, selectedAccountIds, selectedCategory, cat, sortMode, activeTagFilters, applyOverrides, chipMode]);

      // 보낸메시지함 (type chip 필터 + 정렬 적용)
      const sentMessages = useMemo(() => {
        if (selectedCategory !== 'sent') return [];
        let list = messages.filter((m) => m.direction === 'outgoing');
        // type chip 필터
        if (activeTagFilters.size > 0) {
          list = list.filter((m) => {
            const thread = threads.find((t) => t.id === m.thread_id);
            return thread && activeTagFilters.has(thread.message_type);
          });
        }
        // 정렬
        if (sortMode === 'priority') {
          list = [...list].sort((a, b) => {
            const tA = threads.find((t) => t.id === a.thread_id);
            const tB = threads.find((t) => t.id === b.thread_id);
            return (tB ? tB.priority_score : 0) - (tA ? tA.priority_score : 0);
          });
        } else {
          list = [...list].sort((a, b) => b.sent_at.localeCompare(a.sent_at));
        }
        return list;
      }, [selectedCategory, messages, threads, activeTagFilters, sortMode]);

      const toggleTagFilter = useCallback((tag) => {
        setActiveTagFilters((prev) => {
          const next = new Set(prev);
          if (next.has(tag)) next.delete(tag);
          else next.add(tag);
          return next;
        });
      }, []);

      // 선택 모드 종료
      const exitSelectionMode = useCallback(() => {
        setSelectionMode(false);
        setSelectedThreadIds(new Set());
      }, []);

      // 카드 클릭 핸들러
      const handleCardClick = useCallback((threadId) => {
        if (selectionMode) {
          // 선택 모드: 토글
          setSelectedThreadIds((prev) => {
            const next = new Set(prev);
            if (next.has(threadId)) next.delete(threadId);
            else next.add(threadId);
            // 마지막 선택 해제 시 모드 종료
            if (next.size === 0) {
              setSelectionMode(false);
            }
            return next;
          });
        } else {
          // 선택 모드 OFF: SidePanel 열기
          if (onSelectThread) onSelectThread(threadId);
        }
      }, [selectionMode, showToast]);

      // 체크박스 클릭 (선택 모드 진입 포함)
      const handleCheckboxClick = useCallback((threadId) => {
        setSelectionMode(true);
        setSelectedThreadIds((prev) => {
          const next = new Set(prev);
          if (next.has(threadId)) {
            next.delete(threadId);
            if (next.size === 0) setSelectionMode(false);
          } else {
            next.add(threadId);
          }
          return next;
        });
      }, []);

      // 일괄 읽음 처리
      const handleMarkRead = useCallback(() => {
        if (selectedThreadIds.size === 0) return;
        onProcessThreads([...selectedThreadIds]);
        const cnt = selectedThreadIds.size;
        exitSelectionMode();
        showToast({ message: `${cnt}개 스레드를 처리했어요` });
      }, [selectedThreadIds, onProcessThreads, exitSelectionMode, showToast]);

      // 일괄 태그 추가 (Modal apply)
      const handleTagApply = useCallback((tags) => {
        if (selectedThreadIds.size === 0 || tags.length === 0) return;
        onTagThreads([...selectedThreadIds], tags);
        const cnt = selectedThreadIds.size;
        const tagLabel = tags.length === 1 ? tags[0] : `${tags.length}개 태그`;
        setTagModalOpen(false);
        exitSelectionMode();
        showToast({ message: `${cnt}개 스레드에 '${tagLabel}'를 추가했어요` });
      }, [selectedThreadIds, onTagThreads, exitSelectionMode, showToast]);

      return (
        <div className="inbox-list">
          {/* 선택 모드: BulkActionBar */}
          {selectionMode && (
            <BulkActionBar
              count={selectedThreadIds.size}
              onClose={exitSelectionMode}
              onMarkRead={handleMarkRead}
              onTagApply={() => setTagModalOpen(true)}
            />
          )}

          {/* DM 자동화 분기 */}
          {selectedCategory === 'dm_automation' ? (
            <AutomationListView
              automations={automations || []}
              activeIgAccountIds={activeIgAccountIds || new Set()}
              onOpenWizardNew={onOpenWizardNew}
              onOpenWizardTemplate={onOpenWizardTemplate}
              onOpenWizardEdit={onOpenWizardEdit}
              onToggleStatus={onToggleAutomationStatus}
            />
          ) : (
            <>
              {/* 툴바: chip 필터 + Sort 버튼 */}
              <div className="inbox-list__toolbar">
                <div className="inbox-list__toolbar-chips">
                  {chipItems.map(({ key, label }) => (
                    <button
                      key={key}
                      className={`tag-filter-chip${activeTagFilters.has(key) ? ' tag-filter-chip--active' : ''}`}
                      onClick={() => toggleTagFilter(key)}
                      type="button"
                      aria-pressed={activeTagFilters.has(key)}
                    >
                      {label}
                    </button>
                  ))}
                </div>
                <div className="inbox-list__sort">
                  <button
                    ref={sortBtnRef}
                    type="button"
                    className="inbox-list__sort-button"
                    onClick={() => setSortPopoverOpen((v) => !v)}
                    aria-expanded={sortPopoverOpen}
                    aria-label="정렬 방식 선택"
                  >
                    <Icon name="sort" size="sm" tone="muted" />
                  </button>
                  <Popover
                    isOpen={sortPopoverOpen}
                    onClose={() => setSortPopoverOpen(false)}
                    anchorRef={sortBtnRef}
                    position="bottom-end"
                  >
                    <div className="inbox-list__sort-dropdown">
                      {[
                        { key: 'priority', label: '우선순위순' },
                        { key: 'latest',   label: '최신순' },
                      ].map(({ key, label }) => (
                        <button
                          key={key}
                          type="button"
                          className={`inbox-list__sort-option${sortMode === key ? ' inbox-list__sort-option--active' : ''}`}
                          onClick={() => { setSortMode(key); setSortPopoverOpen(false); }}
                        >
                          {label}
                          {sortMode === key && <Icon name="check" size="xs" tone="inherit" />}
                        </button>
                      ))}
                    </div>
                  </Popover>
                </div>
              </div>

              {/* 카드 리스트 */}
              <div className="inbox-list__cards">
                {selectedCategory === 'sent' ? (
                  sentMessages.length === 0 ? (
                    <EmptyState
                      icon="category-sent"
                      title="보낸 메시지 없음"
                      description="아직 보낸 메시지가 없어요."
                    />
                  ) : (
                    sentMessages.map((msg) => (
                      <SentMessageCard key={msg.id} msg={msg} onSelectThread={onSelectThread} />
                    ))
                  )
                ) : filteredThreads.length === 0 ? (
                  <EmptyState
                    icon="category-ai-pick"
                    title="미처리 항목 없음"
                    description="이 카테고리의 미처리 메시지가 없어요."
                  />
                ) : (
                  filteredThreads.map((thread) => (
                    <PreviewCard
                      key={thread.id}
                      thread={thread}
                      selectionMode={selectionMode}
                      isSelected={selectedThreadIds.has(thread.id)}
                      isActive={selectedThreadId === thread.id}
                      onCardClick={handleCardClick}
                      onCheckboxClick={handleCheckboxClick}
                    />
                  ))
                )}
              </div>
            </>
          )}

          {/* 일괄 태그 Modal */}
          <BulkTagModal
            isOpen={tagModalOpen}
            onClose={() => setTagModalOpen(false)}
            onApply={handleTagApply}
          />
        </div>
      );
    }

    /* ================================================================
     * Phase 5 — 매크로 빌더 Helper / 검증 함수
     * spec.md §4-8-2
     * ================================================================ */

    function isMessageValid(m) {
      if (!m || !m.body || m.body.trim() === '') return false;
      if (m.type === 'IMAGE_CAROUSEL' && m.images.length < 1) return false;
      for (const b of m.buttons) {
        if (!b.text || b.text.trim() === '') return false;
        if (!b.url || b.url.trim() === '') return false;
      }
      return true;
    }

    function isAutomationValid(a) {
      if (a.target_mode === 'SPECIFIC_POSTS' && a.target_post_ids.length < 1) return false;
      if (a.trigger_mode === 'KEYWORD_MATCH' && a.trigger_keywords.length < 1) return false;
      if (a.reply.enabled && a.reply.items.length < 1) return false;
      if (a.follower_branch.mode === 'DIFFERENT_MESSAGES') {
        if (!isMessageValid(a.follower_branch.follower_message)) return false;
        if (!isMessageValid(a.follower_branch.non_follower_message)) return false;
      } else {
        if (!isMessageValid(a.message)) return false;
      }
      return true;
    }

    // 숫자 포맷 (stat 표시용)
    function fmtStat(n) {
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
      return String(n);
    }

    // path 기반 immutable update helper
    // path 예: 'reply.items[2]', 'message.body', 'follower_branch.mode'
    function setPath(obj, path, value) {
      const keys = path.replace(/\[(\d+)\]/g, '.$1').split('.');
      const result = JSON.parse(JSON.stringify(obj));
      let cur = result;
      for (let i = 0; i < keys.length - 1; i++) {
        cur = cur[keys[i]];
      }
      cur[keys[keys.length - 1]] = value;
      return result;
    }

    // 깊은 merge (template prefill 용)
    function deepMerge(base, override) {
      const result = JSON.parse(JSON.stringify(base));
      for (const key of Object.keys(override)) {
        if (override[key] !== null && typeof override[key] === 'object' && !Array.isArray(override[key])) {
          result[key] = deepMerge(result[key] || {}, override[key]);
        } else {
          result[key] = override[key];
        }
      }
      return result;
    }

    /* ================================================================
     * Phase 5 — WizardState reducer
     * spec.md §5-9-4
     * ================================================================ */

    const WIZARD_INITIAL_STATE = {
      mode: null,
      sourceAutomationId: null,
      draft: null,
      currentStep: 1,
      visitedSteps: new Set(),
      isDirty: false,
      errors: {},
    };

    function wizardReducer(state, action) {
      const blank = JSON.parse(JSON.stringify(window.MOCK_DATA.BLANK_AUTOMATION_DRAFT));
      switch (action.type) {
        case 'OPEN_NEW': {
          const draft = blank;
          return {
            ...WIZARD_INITIAL_STATE,
            mode: 'new',
            sourceAutomationId: null,
            draft,
            currentStep: 1,
            visitedSteps: new Set([1]),
            isDirty: false,
            errors: {},
          };
        }
        case 'OPEN_TEMPLATE': {
          const tmpl = window.MOCK_DATA.AUTOMATION_TEMPLATES.find((t) => t.key === action.key);
          const draft = tmpl ? deepMerge(blank, tmpl.prefill) : blank;
          return {
            ...WIZARD_INITIAL_STATE,
            mode: 'new',
            sourceAutomationId: null,
            draft,
            currentStep: 1,
            visitedSteps: new Set([1]),
            isDirty: false,
            errors: {},
          };
        }
        case 'OPEN_EDIT': {
          const draft = JSON.parse(JSON.stringify(action.automation));
          return {
            ...WIZARD_INITIAL_STATE,
            mode: 'edit',
            sourceAutomationId: action.automation.id,
            draft,
            currentStep: action.startStep || 5,
            visitedSteps: new Set([1, 2, 3, 4, 5]),
            isDirty: false,
            errors: {},
          };
        }
        case 'UPDATE_FIELD': {
          const newDraft = setPath(state.draft, action.path, action.value);
          return { ...state, draft: newDraft, isDirty: action.isDirty !== undefined ? action.isDirty : true, errors: {} };
        }
        case 'GOTO_STEP': {
          const step = action.step;
          if (!state.visitedSteps.has(step) && step !== state.currentStep) return state;
          const next = new Set(state.visitedSteps);
          next.add(step);
          return { ...state, currentStep: step, visitedSteps: next, errors: {} };
        }
        case 'NEXT_STEP': {
          if (state.currentStep >= 5) return state;
          const next = new Set(state.visitedSteps);
          const nextStep = state.currentStep + 1;
          next.add(nextStep);
          return { ...state, currentStep: nextStep, visitedSteps: next, errors: {} };
        }
        case 'PREV_STEP': {
          if (state.currentStep <= 1) return state;
          return { ...state, currentStep: state.currentStep - 1, errors: {} };
        }
        case 'SET_ERRORS': {
          return { ...state, errors: action.errors };
        }
        case 'SAVE': {
          return { ...state, mode: null, draft: null, errors: {} };
        }
        case 'CLOSE': {
          return { ...WIZARD_INITIAL_STATE };
        }
        default:
          return state;
      }
    }

    /* ================================================================
     * Phase 5 — ToggleSwitch
     * ================================================================ */
    function ToggleSwitch({ on, onToggle, label }) {
      return (
        <label className={`toggle-switch${on ? ' toggle-switch--on' : ''}`} aria-label={label}>
          <input
            type="checkbox"
            className="toggle-switch__input"
            checked={on}
            onChange={(e) => { e.stopPropagation(); onToggle(e.target.checked); }}
          />
          <span className="toggle-switch__track" />
          <span className="toggle-switch__knob" />
        </label>
      );
    }

    /* ================================================================
     * Phase 5 — AutomationCard
     * spec.md §5-9-1 / §5-9-6
     * ================================================================ */
    function AutomationCard({ automation, igOrigins, onToggleStatus, onOpenWizardEdit }) {
      const isActive = automation.status === 'ACTIVE';
      const isFuture = automation.target_mode === 'FUTURE_POSTS';
      const PLATFORM_LOGOS = window.MOCK_DATA.PLATFORM_LOGOS;
      const accounts = window.MOCK_DATA.channel.connected_sns_accounts;
      const allOrigins = window.MOCK_DATA.origins;

      // 대상 게시물 썸네일 — SPECIFIC_POSTS: target_post_ids[0] → origin
      const thumbOrigin = !isFuture && automation.target_post_ids && automation.target_post_ids.length > 0
        ? (igOrigins || allOrigins).find((o) => o.media_id === automation.target_post_ids[0])
        : null;

      // 계정 정보 — thumbOrigin의 user_sns_account_id → channel account
      const targetAccount = thumbOrigin
        ? accounts.find((a) => a.id === thumbOrigin.user_sns_account_id)
        : null;

      const title = automation.title || null;

      // 활성 일수 계산 (active_minutes 기반)
      const activeMins = automation.active_minutes || 0;
      const activeDays = Math.floor(activeMins / 1440);
      const activeHours = Math.floor(activeMins / 60);
      const activeLabel = (() => {
        if (!isActive) {
          if (activeDays > 0) return `활성 ${activeDays}일 누적`;
          return '휴면 중';
        }
        if (activeDays > 0) return `활성 ${activeDays}일째`;
        if (activeHours > 0) return `활성 ${activeHours}시간째`;
        return '활성 중';
      })();

      // 등록 일수
      const createdDays = automation.created_at
        ? Math.floor((Date.now() - new Date(automation.created_at)) / 86400000)
        : 0;
      const createdLabel = createdDays > 0 ? `등록 ${createdDays}일 전` : '오늘 등록';

      // 작동 횟수
      const sentLabel = `작동 ${fmtStat(automation.stats.sent)}회`;

      const handleCardClick = (e) => {
        if (e.target.closest('.toggle-switch')) return;
        onOpenWizardEdit(automation, 5);
      };

      return (
        <div
          className={`automation-card${!isActive ? ' automation-card--inactive' : ''}`}
          onClick={handleCardClick}
          role="button"
          tabIndex={0}
          onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleCardClick(e); } }}
        >
          {/* 좌측 썸네일 */}
          <div className="automation-card__thumb">
            {isFuture ? (
              <div className="automation-card__thumb-future">
                <Icon name="category-dm-automation" size="md" tone="muted" />
              </div>
            ) : thumbOrigin && thumbOrigin.post_meta && thumbOrigin.post_meta.thumbnail_url ? (
              <img
                className="automation-card__thumb-image"
                src={thumbOrigin.post_meta.thumbnail_url}
                alt={thumbOrigin.display_name || '게시물 썸네일'}
              />
            ) : (
              <div className="automation-card__thumb-future">
                <Icon name="logo-instagram" size="md" tone="muted" />
              </div>
            )}
          </div>

          {/* 우측 정보 stack */}
          <div className="automation-card__body">

            {/* Top row: 계정 + 토글 */}
            <div className="automation-card__top">
              <div className="automation-card__account">
                {isFuture ? (
                  <span className="automation-card__platform">
                    <Icon name={PLATFORM_LOGOS.instagram} size="xs" tone="muted" />
                    <span>Instagram · 향후 게시물 자동 적용</span>
                  </span>
                ) : targetAccount ? (
                  <span className="automation-card__platform">
                    <Icon name={PLATFORM_LOGOS.instagram} size="xs" tone="muted" />
                    <span className="automation-card__account-handle">{targetAccount.account_handle}</span>
                    <span> · Instagram</span>
                  </span>
                ) : (
                  <span className="automation-card__platform">
                    <Icon name={PLATFORM_LOGOS.instagram} size="xs" tone="muted" />
                    <span>Instagram</span>
                  </span>
                )}
              </div>
              <div className="automation-card__toggle" onClick={(e) => e.stopPropagation()}>
                <ToggleSwitch
                  on={isActive}
                  onToggle={(val) => { onToggleStatus(automation.id, val ? 'ACTIVE' : 'INACTIVE'); }}
                  label={isActive ? '자동화 비활성화' : '자동화 활성화'}
                />
              </div>
            </div>

            {/* L1: 규칙명 */}
            <span className={`automation-card__title${!title ? ' automation-card__title--untitled' : ''}`}>
              {title || '(미설정)'}
            </span>

            {/* L1: 종류 + 키워드 inline */}
            <div className="automation-card__meta-line">
              <span className="automation-card__type-label">댓글 자동화</span>
              <span className="automation-card__meta-sep"> · </span>
              {automation.trigger_mode === 'ALL_COMMENTS' ? (
                <span className="automation-card__keyword">&quot;모든 댓글&quot;</span>
              ) : automation.trigger_keywords && automation.trigger_keywords.length > 0 ? (
                automation.trigger_keywords.map((kw, i) => (
                  <span key={kw}>
                    {i > 0 && <span> </span>}
                    <span className="automation-card__keyword">&quot;{kw}&quot;</span>
                  </span>
                ))
              ) : null}
            </div>

            {/* L2: 메타 (등록·활성·작동) */}
            <div className="automation-card__footer-meta">
              <span className="automation-card__footer-meta-item">{createdLabel}</span>
              <span className="automation-card__meta-sep"> · </span>
              <span className="automation-card__footer-meta-item">{activeLabel}</span>
              <span className="automation-card__meta-sep"> · </span>
              <span className="automation-card__footer-meta-item">{sentLabel}</span>
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================
     * Phase 5 — WizardStepTrigger (step 1)
     * ================================================================ */
    function WizardStepTrigger({ draft, onChange, errors, igOrigins }) {
      const [kw, setKw] = useState('');
      // igOrigins prop이 없으면 전체 IG post로 fallback (wizard 외부에서 activeIg 필터 후 주입)
      const posts = igOrigins || window.MOCK_DATA.origins.filter((o) => o.platform === 'instagram' && o.type === 'post');

      const addKeyword = () => {
        const trimmed = kw.trim();
        if (!trimmed) return;
        if (draft.trigger_keywords.includes(trimmed)) { setKw(''); return; }
        onChange('trigger_keywords', [...draft.trigger_keywords, trimmed]);
        setKw('');
      };

      const removeKeyword = (idx) => {
        onChange('trigger_keywords', draft.trigger_keywords.filter((_, i) => i !== idx));
      };

      const handleKwKeyDown = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addKeyword(); }
      };

      const selectPost = (mediaId) => {
        const already = draft.target_post_ids.includes(mediaId);
        onChange('target_post_ids', already ? [] : [mediaId]);
      };

      return (
        <div className="wizard-step-trigger">
          {/* 대상 게시물 */}
          <div>
            <p className="wizard-section-label">어떤 게시물에서 보낼까요?</p>
            <div className="wizard-radio-group">
              {[
                { value: 'SPECIFIC_POSTS', label: '직접 선택', desc: '특정 게시물의 댓글에만 반응해요' },
                { value: 'FUTURE_POSTS', label: '향후 게시물', desc: '앞으로 올릴 게시물의 댓글에 자동으로 반응해요' },
              ].map(({ value, label, desc }) => (
                <label
                  key={value}
                  className={`wizard-radio-option${draft.target_mode === value ? ' wizard-radio-option--selected' : ''}`}
                >
                  <input
                    type="radio"
                    style={{ display: 'none' }}
                    name="target_mode"
                    value={value}
                    checked={draft.target_mode === value}
                    onChange={() => onChange('target_mode', value)}
                  />
                  <span className="wizard-radio-option__radio">
                    <Icon name={draft.target_mode === value ? 'radio-dot' : 'circle'} size="sm" tone="inherit" />
                  </span>
                  <span>
                    <span className="wizard-radio-option__label">{label}</span>
                    {desc && <span style={{ display: 'block' }} className="wizard-radio-option__desc">{desc}</span>}
                  </span>
                </label>
              ))}
            </div>

            {draft.target_mode === 'SPECIFIC_POSTS' && (
              <div style={{ marginTop: 'var(--gap-inline-sm)' }}>
                <p className="wizard-section-hint">게시물을 선택해 주세요 (1개)</p>
                <div className="ig-post-grid-picker">
                  {posts.map((o) => {
                    const selected = draft.target_post_ids.includes(o.media_id);
                    return (
                      <button
                        key={o.id}
                        type="button"
                        className={`ig-post-grid-picker__cell${selected ? ' ig-post-grid-picker__cell--selected' : ''}`}
                        onClick={() => selectPost(o.media_id)}
                        aria-pressed={selected}
                        aria-label={o.display_name}
                      >
                        <div className="ig-post-grid-picker__cell-placeholder">
                          <Icon name="logo-instagram" size="sm" tone="muted" />
                          <span className="ig-post-grid-picker__cell-name">{o.display_name}</span>
                        </div>
                        {selected && (
                          <span className="ig-post-grid-picker__cell-check">
                            <Icon name="check" size="xs" tone="inverse" />
                          </span>
                        )}
                      </button>
                    );
                  })}
                </div>
                {errors.target_post_ids && <p className="wizard-field-error">{errors.target_post_ids}</p>}
              </div>
            )}
          </div>

          {/* 댓글 트리거 */}
          <div>
            <p className="wizard-section-label">어떤 댓글에 반응할까요?</p>
            <div className="wizard-radio-group">
              {[
                { value: 'ALL_COMMENTS', label: '모든 댓글', desc: '어떤 댓글이든 자동으로 반응해요' },
                { value: 'KEYWORD_MATCH', label: '특정 키워드', desc: '댓글에 키워드가 포함되었을 때만 반응해요' },
              ].map(({ value, label, desc }) => (
                <label
                  key={value}
                  className={`wizard-radio-option${draft.trigger_mode === value ? ' wizard-radio-option--selected' : ''}`}
                >
                  <input
                    type="radio"
                    style={{ display: 'none' }}
                    name="trigger_mode"
                    value={value}
                    checked={draft.trigger_mode === value}
                    onChange={() => onChange('trigger_mode', value)}
                  />
                  <span className="wizard-radio-option__radio">
                    <Icon name={draft.trigger_mode === value ? 'radio-dot' : 'circle'} size="sm" tone="inherit" />
                  </span>
                  <span>
                    <span className="wizard-radio-option__label">{label}</span>
                    {desc && <span style={{ display: 'block' }} className="wizard-radio-option__desc">{desc}</span>}
                  </span>
                </label>
              ))}
            </div>

            {draft.trigger_mode === 'KEYWORD_MATCH' && (
              <div style={{ marginTop: 'var(--gap-inline-sm)' }}>
                <div className="keyword-chip-input">

                    <input
                      type="text"
                      className="keyword-chip-input__field"
                      placeholder="발송하시는 키워드를 입력해주세요"
                      value={kw}
                      onChange={(e) => setKw(e.target.value)}
                      onKeyDown={handleKwKeyDown}
                    />
                    <button type="button" className="keyword-chip-input__add-btn" onClick={addKeyword} aria-label="키워드 추가">
                      <Icon name="plus" size="sm" tone="inverse" />
                    </button>
                  </div>
                  <p className="wizard-section-hint">플러스(+)나 엔터를 눌러서 추가할 수 있어요</p>
                  {draft.trigger_keywords.length > 0 && (
                    <div className="keyword-chip-input__chips">
                      {draft.trigger_keywords.map((kw, i) => (
                        <span key={kw} className="keyword-chip">
                          {kw}
                          <button type="button" className="keyword-chip__remove" onClick={() => removeKeyword(i)} aria-label={`키워드 ${kw} 삭제`}>
                            <Icon name="x" size="xs" tone="inherit" />
                          </button>
                        </span>
                      ))}
                    </div>
                  )}
                  {errors.trigger_keywords && <p className="wizard-field-error">{errors.trigger_keywords}</p>}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ================================================================
     * Phase 5 — WizardStepReply (step 2)
     * ================================================================ */
    function WizardStepReply({ draft, onChange, errors }) {
      const PRESETS = window.MOCK_DATA.AUTOMATION_REPLY_PRESETS;

      const handleToneSelect = (tone) => {
        onChange('reply.tone', tone);
        // POLITE / FRIENDLY → 매 클릭마다 해당 톤의 preset으로 items 교체
        if (tone === 'POLITE' || tone === 'FRIENDLY') {
          onChange('reply.items', [...PRESETS[tone]]);
        }
        // CUSTOM → 직전 items 그대로 유지 (사용자 직접 입력 모드)
      };

      const updateItem = (idx, val) => {
        const next = [...draft.reply.items];
        next[idx] = val;
        onChange('reply.items', next);
      };

      const removeItem = (idx) => {
        onChange('reply.items', draft.reply.items.filter((_, i) => i !== idx));
      };

      const addItem = () => {
        onChange('reply.items', [...draft.reply.items, '']);
      };

      return (
        <div className="wizard-step-reply">
          <p className="wizard-section-label">자동 답글을 달까요?</p>
          <div className="wizard-radio-group">
            {[
              { value: false, label: '아니요', desc: '댓글에 자동 답글 없이 DM만 발송해요' },
              { value: true, label: '네', desc: '댓글에 자동으로 답글을 남겨요' },
            ].map(({ value, label, desc }) => (
              <label
                key={String(value)}
                className={`wizard-radio-option${draft.reply.enabled === value ? ' wizard-radio-option--selected' : ''}`}
              >
                <input
                  type="radio"
                  style={{ display: 'none' }}
                  name="reply_enabled"
                  checked={draft.reply.enabled === value}
                  onChange={() => onChange('reply.enabled', value)}
                />
                <span className="wizard-radio-option__radio">
                  <Icon name={draft.reply.enabled === value ? 'radio-dot' : 'circle'} size="sm" tone="inherit" />
                </span>
                <span>
                  <span className="wizard-radio-option__label">{label}</span>
                  {desc && <span style={{ display: 'block' }} className="wizard-radio-option__desc">{desc}</span>}
                </span>
              </label>
            ))}
          </div>

          {draft.reply.enabled && (
            <div style={{ marginTop: 'var(--gap-inline-sm)', display: 'flex', flexDirection: 'column', gap: 'var(--wizard-section-gap)' }}>
              <div>
                <p className="wizard-section-label">답글 톤을 선택해 주세요</p>
                <div className="reply-tone-tabs">
                  {[
                    { key: 'POLITE', label: '공손하게' },
                    { key: 'FRIENDLY', label: '친근하게' },
                    { key: 'CUSTOM', label: '직접 입력' },
                  ].map(({ key, label }) => (
                    <button
                      key={key}
                      type="button"
                      className={`reply-tone-tab${draft.reply.tone === key ? ' reply-tone-tab--active' : ''}`}
                      onClick={() => handleToneSelect(key)}
                    >
                      {label}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <p className="wizard-section-label">답글 후보 목록</p>
                <p className="wizard-section-hint">여러 개 입력하면 발송 시 랜덤으로 1건이 선택돼요</p>
                <div className="reply-item-list" style={{ marginTop: 'var(--gap-inline-xs)' }}>
                  {draft.reply.items.map((item, idx) => (
                    <div key={idx} className="reply-item-row">
                      <textarea
                        className="reply-item-row__textarea"
                        value={item}
                        onChange={(e) => updateItem(idx, e.target.value)}
                        placeholder="답글 내용을 입력해주세요"
                        rows={2}
                      />
                      <button type="button" className="reply-item-row__remove" onClick={() => removeItem(idx)} aria-label="답글 삭제">
                        <Icon name="minus" size="xs" tone="inherit" />
                      </button>
                    </div>
                  ))}
                  <button type="button" className="reply-item-add-btn" onClick={addItem}>
                    <Icon name="plus" size="sm" tone="inherit" />
                    새로운 답글 추가하기
                  </button>
                </div>
                {errors['reply.items'] && <p className="wizard-field-error">{errors['reply.items']}</p>}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ================================================================
     * Phase 5 — WizardStepFollowerBranch (step 3)
     * ================================================================ */
    function WizardStepFollowerBranch({ draft, onChange }) {
      const options = [
        { value: 'SAME', label: '모두에게 같은 메시지', desc: '팔로워/비팔로워 구분 없이 동일하게 발송해요' },
        { value: 'FOLLOWERS_ONLY', label: '팔로워에게만', desc: '이미 팔로우하는 사람에게만 DM을 보내요' },
        { value: 'NON_FOLLOWERS_ONLY', label: '비팔로워에게만', desc: '아직 팔로우하지 않는 사람에게만 DM을 보내요' },
        { value: 'DIFFERENT_MESSAGES', label: '팔로워/비팔로워 다른 메시지', desc: '두 그룹에 각각 다른 내용으로 발송해요' },
      ];

      return (
        <div className="wizard-step-follower-branch">

          <div className="wizard-radio-group">
            {options.map(({ value, label, desc }) => (
              <label
                key={value}
                className={`wizard-radio-option${draft.follower_branch.mode === value ? ' wizard-radio-option--selected' : ''}`}
              >
                <input
                  type="radio"
                  style={{ display: 'none' }}
                  name="follower_branch_mode"
                  value={value}
                  checked={draft.follower_branch.mode === value}
                  onChange={() => {

                    }
                  }}
                />
                <span className="wizard-radio-option__radio">
                  <Icon name={draft.follower_branch.mode === value ? 'radio-dot' : 'circle'} size="sm" tone="inherit" />
                </span>
                <span>
                  <span className="wizard-radio-option__label">{label}</span>
                  {desc && <span style={{ display: 'block' }} className="wizard-radio-option__desc">{desc}</span>}
